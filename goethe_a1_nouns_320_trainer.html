*{box-sizing:border-box}
body{

}
h1{

}
.sub{

}
.modebar{

    gap:10px;
    margin:18px 0;
}
.btn{
    border:0;

    padding:16px 14px;
    font-weight:900;
    cursor:pointer;
    font-family:Arial,sans-serif;
    background:#fffdf9;

}
.btn:hover{

}
.btn.active,.btn.primary{

.card{

.kicker{

.meaning{

.option:hover{

}
.option.correct{

}
.option.wrong{

}
.feedback{

.feedback.good{background:#eefaf3;border-color:#b9e6cc}

.controls{

    margin-top:16px;
}
.controls .btn{

}
.stats{

}
.stat{

    padding:12px;

.stat b{display:block;font-size:28px}

    margin-top:10px;

.hidden{display:none}

    background:#fff;
    font-family:Arial,sans-serif;

.inputRow{display:flex;gap:8px}
.inputRow input{flex:1;margin:0}
.tablewrap{

    border:1px solid var(--line);
    border-radius:16px;
}
table{

    background:#fff;

}
th,td{

th{position:sticky;top:0;background:#f0dfcb}
.small{font-size:13px;color:var(--muted);font-family:Arial,sans-serif}
.example{font-size:15px;color:var(--muted);margin-top:8px}
.pill{
    display:inline-block;

    background:#eadcc9;

    padding:3px 8px;
    font-size:12px;
    font-weight:800;

.badge{

    background:var(--soft);

    font-size:12px;
    font-weight:850;

.tilegrid{

.tile{

.countLine{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:12px;
}
</style>

"example_en": "The sport is important."}];
let state = {mode:'article', current:null, score:0, total:0, correct:0, streak:0, answered:false};
let mistakes = JSON.parse(localStorage.getItem('goetheA1NounOnlyMistakes') || '{}');

const $ = id => document.getElementById(id);
const pick = a => a[Math.floor(Math.random()*a.length)];
const shuffle = a => [...a].sort(()=>Math.random()-.5);
const norm = s => (s||'').trim().toLowerCase().replace(/[.,;:!?]/g,'').replace(/ß/g,'ss').replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/\s+/g,' ');

function saveMistakes(){localStorage.setItem('goetheA1NounOnlyMistakes', JSON.stringify(mistakes));}
function addMistake(label){mistakes[label]=(mistakes[label]||0)+1; saveMistakes();}
function statsHtml(){
    return `<div class="stats">
    <div class="stat"><span class="small">Score</span><b>${state.score}</b></div>
    <div class="stat"><span class="small">Streak</span><b>${state.streak}</b></div>
    <div class="stat"><span class="small">Accuracy</span><b>${state.total?Math.round(state.correct/state.total*100):0}%</b></div>
    <div class="stat"><span class="small">Mistakes</span><b>${Object.keys(mistakes).length}</b></div>
    </div>`;
}
function shell(){
    $('content').innerHTML = `<div class="grid">
    <div class="card">
        <div class="kicker" id="modeLabel"></div>
        <div class="big" id="word"></div>
        <div class="meaning" id="hint"></div>
        <div class="prompt" id="prompt"></div>
        <div id="answers" class="options"></div>
        <div id="feedback" class="feedback"></div>
        <div class="controls"><button class="btn primary" onclick="render()">Next question</button></div>
    </div>
    <aside class="card">
        <div id="statsBox">${statsHtml()}</div>
        <div class="rule"><b>Golden rule</b><br>Do not memorize only <b>Buch</b>. Memorize <b>das Buch</b>. Article + noun is one unit.</div>
        <div class="rule"><b>Plural rule</b><br>Plural is often not predictable. Learn it with the noun: <b>das Buch, die Bücher</b>.</div>
        <div class="rule"><b>Current list</b><br><b>${NOUNS.length}</b> nouns loaded in this file.</div>
    </aside>
    </div>`;
}
function updateStats(){let b=$('statsBox'); if(b)b.innerHTML=statsHtml();}
function setBase(label, word, hint, prompt){
    $('modeLabel').textContent = label;
    $('word').textContent = word;
    $('hint').textContent = hint;
    $('prompt').innerHTML = prompt;
    $('answers').innerHTML = '';
    $('feedback').style.display = 'none';
    state.answered = false;
    updateStats();
}
function feedback(ok, html){
    let f=$('feedback');
    f.className='feedback '+(ok?'good':'bad');
    f.innerHTML=(ok?'<b>Correct.</b><br>':'<b>Not quite.</b><br>')+html;
    f.style.display='block';
    updateStats();
}
function answer(btn, ok, fb, label){
    if(state.answered)return;
    state.answered=true;
    state.total++;
    if(ok){state.correct++;state.score+=10;state.streak++;btn.classList.add('correct');}
    else{
        state.streak=0;
        btn.classList.add('wrong');
        addMistake(label);
        document.querySelectorAll('.option').forEach(x=>{if(x.dataset.ok==='1')x.classList.add('correct');});
    }
    document.querySelectorAll('.option').forEach(x=>x.disabled=true);
    feedback(ok, fb);
}
function opt(text, ok, fb, label){
    let b=document.createElement('button');
    b.className='option';
    b.innerHTML=text;
    b.dataset.ok=ok?'1':'0';
    b.onclick=()=>answer(b, ok, fb, label);
    $('answers').appendChild(b);
}
function cleanMeaning(s){return norm(s).replace(/^to /,'').trim();}
function meaningOk(val, correct){
    let a=cleanMeaning(val);
    let parts=correct.split(',').map(x=>cleanMeaning(x)).filter(Boolean);
    parts.push(cleanMeaning(correct));
    return parts.some(x=>a===x || x.includes(a) || a.includes(x));
}
function checkTyped(ok, label, fb, extra=''){
    state.answered=true;
    state.total++;
    if(ok){state.correct++;state.score+=10;state.streak++;}
    else{state.streak=0;addMistake(label);}
    feedback(ok, fb + extra);
}
function articleQ(){
    shell();
    let n=pick(NOUNS); state.current=n;
    setBase('Der Die Das', n.word, `Meaning: ${n.meaning} | Plural: ${n.plural} | ${n.category}`, 'Choose the correct article.');
    let correctArticle = n.article;
    let choices = correctArticle === 'der/die' ? ['der','die','das','der/die'] : ['der','die','das'];
    let fb = `Correct answer: <b>${n.article} ${n.word}</b>.<div class="example">${n.example}<br>${n.example_en}</div>`;
    choices.forEach(a=>opt(a, a===correctArticle, fb, `${n.article} ${n.word}`));
}
function meaningQ(typed=false){
    shell();
    let n=pick(NOUNS); state.current=n;
    setBase(typed?'Typed meaning':'Meaning choices', `${n.article} ${n.word}`, `Plural: ${n.plural} | ${n.category}`, 'What does this noun mean?');
    let fb = `<b>${n.article} ${n.word}</b> means <b>${n.meaning}</b>.<div class="example">${n.example}<br>${n.example_en}</div>`;
    if(typed){
        $('answers').innerHTML = `<div class="inputRow"><input id="typedInput" placeholder="Type English meaning"><button class="btn primary" id="checkBtn">Check</button></div>`;
        $('typedInput').focus();
        let check=()=>{
            if(state.answered)return;
            let val=$('typedInput').value;
            checkTyped(meaningOk(val,n.meaning), `${n.article} ${n.word}`, fb, `<br>Your answer: <b>${val||'(empty)'}</b>`);
        };
        $('checkBtn').onclick=check;
        $('typedInput').addEventListener('keydown',e=>{if(e.key==='Enter')check();});
    } else {
        let opts=shuffle([n.meaning,...shuffle(NOUNS.filter(x=>x.word!==n.word)).slice(0,3).map(x=>x.meaning)]);
        opts.forEach(o=>opt(o, o===n.meaning, fb, `${n.article} ${n.word}`));
    }
}
function pluralQ(){
    shell();
    let pool=NOUNS.filter(x=>x.plural && x.plural !== '-');
    let n=pick(pool); state.current=n;
    setBase('Plural choices', `${n.article} ${n.word}`, `Meaning: ${n.meaning} | ${n.category}`, 'Choose the plural form.');
    let opts=shuffle([n.plural,...shuffle(pool.filter(x=>x.word!==n.word)).slice(0,3).map(x=>x.plural)]);
    let fb = `Plural of <b>${n.article} ${n.word}</b> is <b>${n.plural}</b>.`;
    opts.forEach(o=>opt(o, o===n.plural, fb, `${n.article} ${n.word}`));
}
function typedGermanQ(){
    shell();
    let n=pick(NOUNS); state.current=n;
    setBase('English to German', n.meaning, `Category: ${n.category}`, 'Type the German noun with article.');
    $('answers').innerHTML = `<div class="inputRow"><input id="typedInput" placeholder="Example: das Buch"><button class="btn primary" id="checkBtn">Check</button></div><div class="small">Include the article. For der/die Bekannte, type der Bekannte or die Bekannte.</div>`;
    $('typedInput').focus();
    let check=()=>{
        if(state.answered)return;
        let val=$('typedInput').value;
        let accepted = [`${n.article} ${n.word}`];
        if(n.article==='der/die') accepted = [`der ${n.word}`, `die ${n.word}`, `der/die ${n.word}`];
        let ok = accepted.some(a=>norm(a)===norm(val));
        let fb = `Correct answer: <b>${n.article} ${n.word}</b>.<br>Plural: <b>${n.plural}</b><div class="example">${n.example}<br>${n.example_en}</div>`;
        checkTyped(ok, `${n.article} ${n.word}`, fb, `<br>Your answer: <b>${val||'(empty)'}</b>`);
    };
    $('checkBtn').onclick=check;
    $('typedInput').addEventListener('keydown',e=>{if(e.key==='Enter')check();});
}
function trueFalseQ(){
    shell();
    let n=pick(NOUNS); state.current=n;
    let makeFalse = Math.random() < .5;
    let shown = n.article;
    let correctText = `${n.article} ${n.word}`;
    if(makeFalse){
        let arts=['der','die','das'].filter(a=>a!==n.article && n.article!=='der/die');
        if(n.article==='der/die') arts=['das'];
        shown = pick(arts);
    }
    let statement = `${shown} ${n.word}`;
    setBase('True or False', statement, `Meaning: ${n.meaning} | Plural: ${n.plural}`, 'Is this article correct?');
    let okTrue = !makeFalse;
    let fb = `Correct form: <b>${correctText}</b>.`;
    opt('True', okTrue, fb, correctText);
    opt('False', !okTrue, fb, correctText);
}
function listView(){
    $('content').innerHTML = `<div class="card">
    <div class="kicker">Full noun list</div>
    <div class="big" style="font-size:42px">320 nouns</div>
    <div class="meaning">Search by German, English, article, plural, or category.</div>
    <input id="search" class="search" placeholder="Search nouns">
    <select id="category">
        <option value="all">All categories</option>
        ${[...new Set(NOUNS.map(n=>n.category))].sort().map(c=>`<option value="${c}">${c}</option>`).join('')}
    </select>
    <div class="tablewrap"><table id="nounTable"></table></div>
    </div>`;
    function renderTable(){
        let q=norm($('search').value);
        let cat=$('category').value;
        let rows=NOUNS.filter(n=>(cat==='all'||n.category===cat) && norm(`${n.article} ${n.word} ${n.plural} ${n.meaning} ${n.category}`).includes(q));
        $('nounTable').innerHTML='<thead><tr><th>#</th><th>Article</th><th>Noun</th><th>Plural</th><th>English</th><th>Category</th></tr></thead><tbody>'+
        rows.map((n,i)=>`<tr><td>${i+1}</td><td><b>${n.article}</b></td><td><b>${n.word}</b></td><td>${n.plural}</td><td>${n.meaning}</td><td>${n.category}</td></tr>`).join('')+'</tbody>';
    }
    $('search').oninput=renderTable;
    $('category').onchange=renderTable;
    renderTable();
}
function rulesView(){
    $('content').innerHTML = `<div class="card">
    <div class="kicker">Noun rules</div>
    <div class="tilegrid">
        <div class="tile"><b>1. Learn article + noun together</b><br>Say <b>das Buch</b>, not only Buch. German nouns are married to their articles. Divorce is not allowed.</div>
        <div class="tile"><b>2. Basic article idea</b><br><span class="badge">der masculine</span><span class="badge">die feminine</span><span class="badge">das neuter</span><br>But many nouns must simply be memorized.</div>
        <div class="tile"><b>3. Useful endings</b><br><b>die</b>: -ung, -heit, -keit, -schaft, -ion, -e often feminine.<br><b>das</b>: -chen, -lein, -ment often neuter.</div>
        <div class="tile"><b>4. Plural is important</b><br>der Apfel → die Äpfel<br>das Buch → die Bücher<br>die Frau → die Frauen</div>
        <div class="tile"><b>5. Always plural article is die</b><br>Singular can be der, die, das. Plural article is normally <b>die</b>.</div>
        <div class="tile"><b>6. A1 practice order</b><br>First article, then English meaning, then plural, then English to German typing.</div>
    </div>
    </div>`;
}
function mistakesView(){
    let entries=Object.entries(mistakes).sort((a,b)=>b[1]-a[1]);
    $('content').innerHTML = `<div class="card">
    <div class="kicker">Mistakes only</div>
    <div class="big" style="font-size:42px">${entries.length}</div>
    <div class="meaning">Saved in this browser.</div>
    <div id="mistakeList">${entries.length?entries.map(([w,n])=>`<div class="rule"><b>${w}</b><span class="pill">${n}</span></div>`).join(''):'<p>No mistakes saved yet.</p>'}</div>
    <div class="controls"><button class="btn primary" onclick="mistakes={};saveMistakes();mistakesView()">Clear mistakes</button><button class="btn" onclick="state.mode='article';setActive('article');render()">Practice again</button></div>
    </div>`;
}
function setActive(mode){
    document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
}
function render(){
    setActive(state.mode);
    if(state.mode==='article') return articleQ();
    if(state.mode==='meaning') return meaningQ(false);
    if(state.mode==='typed_meaning') return meaningQ(true);
    if(state.mode==='plural') return pluralQ();
    if(state.mode==='typed_german') return typedGermanQ();
    if(state.mode==='truefalse') return trueFalseQ();
    if(state.mode==='list') return listView();
    if(state.mode==='rules') return rulesView();
    if(state.mode==='mistakes') return mistakesView();
}
document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;render();});
render();
</script>
