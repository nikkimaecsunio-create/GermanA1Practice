<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Goethe A1 Sprechprüfung Active Trainer Plus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F3ECDB;--paper-deep:#EAE1CB;--ink:#221C14;--ink-soft:#4A4233;--muted:#83785F;
  --tag:#F0C93B;--tag-dark:#C99A1E;--stamp:#B23B2C;--stamp-dark:#8E2E22;--line:#D8CCA9;
  --white:#FFFCF4;--good:#DCEFD9;--goodText:#2E6B2A;--bad:#FBE0DC;--badText:#8E2E22;--blue:#E5EEF9;
}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif}
#app{min-height:100vh;padding:26px 18px 60px;background:radial-gradient(1100px 500px at 10% -10%, rgba(240,201,59,.12), transparent 60%),var(--paper)}
.wrap{max-width:1180px;margin:0 auto}
header{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.stamp-badge{width:64px;height:64px;border-radius:50%;border:3px solid var(--stamp);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;color:var(--stamp);transform:rotate(-9deg);background:repeating-radial-gradient(circle, transparent 0 2px, rgba(178,59,44,.04) 2px 3px)}
h1{font-family:'Space Mono',monospace;font-size:clamp(22px,4vw,34px);margin:0;letter-spacing:-.5px}
.subtitle{margin:5px 0 0;color:var(--muted);font-size:13px;font-family:'Space Mono',monospace}
.panel{background:var(--white);border:1.5px solid var(--line);border-radius:16px;padding:16px;margin:14px 0}
.topGrid{display:grid;grid-template-columns:1.1fr .9fr;gap:12px}
@media(max-width:850px){.topGrid{grid-template-columns:1fr}}
.controlGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;align-items:end}
label{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
select,input[type=range]{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:12px;background:var(--white);font-family:'Inter',sans-serif;color:var(--ink)}
.nav{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:9px;margin:14px 0}
.btn{border:1.5px solid var(--line);border-radius:999px;padding:10px 14px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;background:var(--white);color:var(--ink-soft);cursor:pointer}
.btn:hover{border-color:var(--stamp);color:var(--stamp)}
.btn.active,.btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn.dark{background:var(--stamp);color:var(--white);border-color:var(--stamp)}
.btn.small{padding:7px 10px;font-size:11px}
.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
.card{background:var(--white);border:1.5px solid var(--line);border-radius:18px;padding:20px;box-shadow:0 16px 30px -18px rgba(34,28,20,.25)}
.kicker{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.big{font-family:'Space Mono',monospace;font-size:clamp(26px,4.4vw,42px);font-weight:700;line-height:1.08;margin:8px 0}
.questionBox{background:var(--tag);border-radius:16px;padding:20px;position:relative;box-shadow:0 16px 30px -18px rgba(34,28,20,.35)}
.wordTag{display:inline-block;background:rgba(255,255,255,.45);border:1px solid var(--tag-dark);border-radius:999px;padding:5px 10px;font-family:'Space Mono',monospace;font-size:12px;margin-bottom:10px}
.question{font-size:24px;font-weight:800;line-height:1.35}
.translation,.small{color:var(--ink-soft);font-size:13px;line-height:1.45}
.prompt{font-size:19px;font-weight:800;margin:15px 0 10px}
.textarea{width:100%;min-height:120px;border:1.5px solid var(--line);border-radius:14px;padding:14px;font-size:18px;font-family:'Inter',sans-serif;background:#fff;resize:vertical}
.answerBox{min-height:58px;background:#fff;border:1.5px dashed var(--stamp);border-radius:14px;padding:12px;margin:12px 0}
.chip,.placed,.hintChip{display:inline-block;border:1.5px solid var(--line);border-radius:999px;padding:9px 12px;margin:4px;background:#fff;font-weight:700}
.chip{cursor:pointer}
.placed{background:var(--paper-deep)}
.hintChip{background:#FFF6DD;border-color:var(--tag-dark);font-size:13px}
.feedback{display:none;margin-top:14px;border-radius:16px;padding:15px;line-height:1.55;border:1.5px solid var(--line)}
.feedback.good{display:block;background:var(--good);border-color:#A7D3A0;color:var(--goodText)}
.feedback.bad{display:block;background:var(--bad);border-color:#E4AAA2;color:var(--badText)}
.feedback.neutral{display:block;background:var(--blue);border-color:#B8C8DE;color:var(--ink)}
.answer{font-size:19px;font-weight:800;margin:7px 0;color:var(--ink)}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.stat{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:12px}
.stat span{font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;color:var(--muted)}
.stat b{display:block;font-size:26px}
.bar{height:12px;background:#fff;border:1.5px solid var(--line);border-radius:999px;overflow:hidden;margin-top:10px}
.fill{height:100%;background:var(--stamp);width:0}
.rule{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:13px;margin-top:10px;line-height:1.5;font-size:14px}
table{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden;border-radius:14px;border:1.5px solid var(--line);background:#fff;margin-top:10px}
th,td{padding:10px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);text-align:left;vertical-align:top;font-size:14px}
th{background:var(--paper-deep);font-family:'Space Mono',monospace;font-size:12px}
tr:last-child td{border-bottom:0} th:last-child,td:last-child{border-right:0}
.hiddenQ{filter:blur(7px);user-select:none}
.cardGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;margin-top:12px}
.miniCard{background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:14px;cursor:pointer}
.miniCard:hover{border-color:var(--stamp)}
.timer{font-family:'Space Mono',monospace;font-size:34px;font-weight:700;color:var(--stamp);margin:4px 0}
.timer.danger{color:#fff;background:var(--stamp);display:inline-block;padding:5px 12px;border-radius:12px}
.hidden{display:none!important}
.modeNote{background:#FFF6DD;border:1.5px solid var(--tag-dark);border-radius:14px;padding:12px;margin:10px 0;color:var(--ink-soft);line-height:1.5}
.progressList{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
.progressCard{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:13px}
.okPill{display:inline-block;background:var(--good);color:var(--goodText);border-radius:999px;padding:4px 8px;font-size:12px;font-weight:800}
.badPill{display:inline-block;background:var(--bad);color:var(--badText);border-radius:999px;padding:4px 8px;font-size:12px;font-weight:800}

details.studyDetails{
    background:#fff;
    border:1.5px solid var(--line);
    border-radius:14px;
    margin-top:10px;
    overflow:hidden;
}
details.studyDetails summary{
    cursor:pointer;
    padding:12px 14px;
    font-family:'Space Mono',monospace;
    font-size:12px;
    font-weight:700;
    color:var(--stamp-dark);
    background:#fffaf4;
}
details.studyDetails summary::after{
    content:"Open";
    float:right;
    color:var(--muted);
}
details.studyDetails[open] summary::after{
    content:"Close";
}
.studyDetailsBody{
    padding:13px 14px;
    line-height:1.5;
    color:var(--ink-soft);
    background:#fff8ef;
    border-top:1.5px solid var(--line);
}

</style>
</head>
<body>
<div id="app">
<div class="wrap">
<header>
  <div class="stamp-badge">A1</div>
  <div>
    <h1>Sprechprüfung Active Trainer Plus</h1>
    <p class="subtitle">Goethe A1 · active recall · speaking · exam mode · audio</p>
  </div>
</header>

<div class="topGrid">
  <div class="panel">
    <div class="controlGrid">
      <div><label>Theme</label><select id="themeSelect"></select></div>
      <div><label>Anrede</label><select id="anredeSelect"><option value="du">Du</option><option value="sie">Sie</option><option value="mixed">Mixed Du/Sie</option></select></div>
      <div><label>Session Size</label><select id="sessionSelect"><option>10</option><option selected>30</option><option>50</option></select></div>
      <div><label>Voice</label><select id="voiceSelect"><option>Loading voices...</option></select></div>
      <div><label>Rate</label><input id="voiceRate" type="range" min="0.55" max="1.1" step="0.05" value="0.82"></div>
      <div><label>Pitch</label><input id="voicePitch" type="range" min="0.8" max="1.2" step="0.1" value="1"></div>
    </div>
  </div>
  <div class="panel">
    <div class="kicker">What changed</div>
    <div class="small">Flexible checking, answer variations, speaking mode, exam mode, mistakes review, progress tracking, and grammar reminders are now included.</div>
  </div>
</div>

<div class="nav">
  <button class="btn active" data-mode="type">Type Answer</button>
  <button class="btn" data-mode="build">Build Answer</button>
  <button class="btn" data-mode="listen">Listen & Answer</button>
  <button class="btn" data-mode="speak">Speaking Mode</button>
  <button class="btn" data-mode="exam">Exam Mode</button>
  <button class="btn" data-mode="mistakes">Mistakes Only</button>
  <button class="btn" data-mode="cards">Study Cards</button>
  <button class="btn" data-mode="progress">Progress</button>
  <button class="btn" data-mode="theory">Theory</button>
</div>

<div id="content"></div>
</div>
</div>

<script>
const ROUNDS = [{"thema": "Essen und Trinken", "corrections": ["\"Essen und trinken\" → \"Essen und Trinken\" (beide Wörter sind hier Nomen)", "\"Helfen\" → \"helfen\" (Verb, klein geschrieben)", "\"durst\" → \"Durst\" (Nomen, groß geschrieben)", "\"Gemuse\" → \"Gemüse\" (fehlender Umlaut)"], "items": [{"wort": "Kuchen", "variants": [{"frage_du": "Wie schmeckt dir der Kuchen?", "antwort_du": "Der Kuchen schmeckt mir gut.", "frage_sie": "Wie schmeckt Ihnen der Kuchen?", "antwort_sie": "Der Kuchen schmeckt mir gut.", "frage_en": "How does the cake taste to you?", "antwort_en": "The cake tastes good to me."}, {"frage_du": "Wann isst du Kuchen?", "antwort_du": "Ich esse Kuchen am Sonntag.", "frage_sie": "Wann essen Sie Kuchen?", "antwort_sie": "Ich esse Kuchen am Sonntag.", "frage_en": "When do you eat cake?", "antwort_en": "I eat cake on Sunday."}, {"frage_du": "Wo kaufst du den Kuchen?", "antwort_du": "Ich kaufe den Kuchen in der Bäckerei.", "frage_sie": "Wo kaufen Sie den Kuchen?", "antwort_sie": "Ich kaufe den Kuchen in der Bäckerei.", "frage_en": "Where do you buy the cake?", "antwort_en": "I buy the cake at the bakery."}]}, {"wort": "Orange", "variants": [{"frage_du": "Was machst du mit der Orange?", "antwort_du": "Ich esse die Orange zum Frühstück.", "frage_sie": "Was machen Sie mit der Orange?", "antwort_sie": "Ich esse die Orange zum Frühstück.", "frage_en": "What do you do with the orange?", "antwort_en": "I eat the orange for breakfast."}, {"frage_du": "Wie viele Orangen isst du pro Woche?", "antwort_du": "Ich esse drei Orangen pro Woche.", "frage_sie": "Wie viele Orangen essen Sie pro Woche?", "antwort_sie": "Ich esse drei Orangen pro Woche.", "frage_en": "How many oranges do you eat per week?", "antwort_en": "I eat three oranges per week."}, {"frage_du": "Wo kaufst du die Orange?", "antwort_du": "Ich kaufe die Orange auf dem Markt.", "frage_sie": "Wo kaufen Sie die Orange?", "antwort_sie": "Ich kaufe die Orange auf dem Markt.", "frage_en": "Where do you buy the orange?", "antwort_en": "I buy the orange at the market."}]}, {"wort": "Wein", "variants": [{"frage_du": "Wie schmeckt dir der Wein?", "antwort_du": "Der Wein schmeckt mir gut.", "frage_sie": "Wie schmeckt Ihnen der Wein?", "antwort_sie": "Der Wein schmeckt mir gut.", "frage_en": "How does the wine taste to you?", "antwort_en": "The wine tastes good to me."}, {"frage_du": "Wann trinkst du Wein?", "antwort_du": "Ich trinke Wein am Abend.", "frage_sie": "Wann trinken Sie Wein?", "antwort_sie": "Ich trinke Wein am Abend.", "frage_en": "When do you drink wine?", "antwort_en": "I drink wine in the evening."}, {"frage_du": "Wer trinkt den Wein?", "antwort_du": "Mein Vater trinkt den Wein.", "frage_sie": "Wer trinkt den Wein?", "antwort_sie": "Mein Vater trinkt den Wein.", "frage_en": "Who drinks the wine?", "antwort_en": "My father drinks the wine."}]}, {"wort": "Saft", "variants": [{"frage_du": "Wie schmeckt dir der Saft?", "antwort_du": "Der Saft schmeckt mir süß.", "frage_sie": "Wie schmeckt Ihnen der Saft?", "antwort_sie": "Der Saft schmeckt mir süß.", "frage_en": "How does the juice taste to you?", "antwort_en": "The juice tastes sweet to me."}, {"frage_du": "Wann trinkst du Saft?", "antwort_du": "Ich trinke Saft am Morgen.", "frage_sie": "Wann trinken Sie Saft?", "antwort_sie": "Ich trinke Saft am Morgen.", "frage_en": "When do you drink juice?", "antwort_en": "I drink juice in the morning."}, {"frage_du": "Wie viel Saft trinkst du am Tag?", "antwort_du": "Ich trinke ein Glas Saft am Tag.", "frage_sie": "Wie viel Saft trinken Sie am Tag?", "antwort_sie": "Ich trinke ein Glas Saft am Tag.", "frage_en": "How much juice do you drink per day?", "antwort_en": "I drink one glass of juice per day."}]}, {"wort": "kosten", "variants": [{"frage_du": "Wie viel kostet der Kaffee?", "antwort_du": "Der Kaffee kostet drei Euro.", "frage_sie": "Wie viel kostet der Kaffee?", "antwort_sie": "Der Kaffee kostet drei Euro.", "frage_en": "How much does the coffee cost?", "antwort_en": "The coffee costs three euros."}, {"frage_du": "Wie viel kostet die Suppe im Restaurant?", "antwort_du": "Die Suppe kostet fünf Euro.", "frage_sie": "Wie viel kostet die Suppe im Restaurant?", "antwort_sie": "Die Suppe kostet fünf Euro.", "frage_en": "How much does the soup cost at the restaurant?", "antwort_en": "The soup costs five euros."}, {"frage_du": "Warum kostet der Fisch so viel?", "antwort_du": "Der Fisch kostet viel, weil er frisch ist.", "frage_sie": "Warum kostet der Fisch so viel?", "antwort_sie": "Der Fisch kostet viel, weil er frisch ist.", "frage_en": "Why does the fish cost so much?", "antwort_en": "The fish costs a lot because it's fresh."}]}, {"wort": "Fisch", "variants": [{"frage_du": "Wie schmeckt dir der Fisch?", "antwort_du": "Der Fisch schmeckt mir lecker.", "frage_sie": "Wie schmeckt Ihnen der Fisch?", "antwort_sie": "Der Fisch schmeckt mir lecker.", "frage_en": "How does the fish taste to you?", "antwort_en": "The fish tastes delicious to me."}, {"frage_du": "Wann isst du Fisch?", "antwort_du": "Ich esse Fisch am Freitag.", "frage_sie": "Wann essen Sie Fisch?", "antwort_sie": "Ich esse Fisch am Freitag.", "frage_en": "When do you eat fish?", "antwort_en": "I eat fish on Friday."}, {"frage_du": "Wo kaufst du den Fisch?", "antwort_du": "Ich kaufe den Fisch im Supermarkt.", "frage_sie": "Wo kaufen Sie den Fisch?", "antwort_sie": "Ich kaufe den Fisch im Supermarkt.", "frage_en": "Where do you buy the fish?", "antwort_en": "I buy the fish at the supermarket."}]}, {"wort": "Supermarkt", "variants": [{"frage_du": "Was kaufst du im Supermarkt?", "antwort_du": "Ich kaufe Brot im Supermarkt.", "frage_sie": "Was kaufen Sie im Supermarkt?", "antwort_sie": "Ich kaufe Brot im Supermarkt.", "frage_en": "What do you buy at the supermarket?", "antwort_en": "I buy bread at the supermarket."}, {"frage_du": "Wann gehst du in den Supermarkt?", "antwort_du": "Ich gehe am Samstag in den Supermarkt.", "frage_sie": "Wann gehen Sie in den Supermarkt?", "antwort_ const $=id=>document.getElementById(id);
const shuffle=a=>[...a].sort(()=>Math.random()-.5);

function initControls(){
  $('themeSelect').innerHTML = `<option value="__all__">All themes</option>` + ROUNDS.map(r=>`<option value="${r.thema}">${r.thema}</option>`).join('');
  $('themeSelect').onchange=()=>{state.sessionCount=0; render()};
  $('anredeSelect').onchange=()=>{state.sessionCount=0; render()};
  $('sessionSelect').onchange=()=>{state.sessionCount=0; render()};
}
function loadVoices(){
  voices = window.speechSynthesis ? speechSynthesis.getVoices() : [];
  let german = voices.filter(v=>(v.lang||'').toLowerCase().startsWith('de') || /german|deutsch|anna|katja|markus/i.test(v.name));
  let ordered = german.length ? german : voices;
  $('voiceSelect').innerHTML = ordered.map(v=>`<option value="${voices.indexOf(v)}">${v.name} · ${v.lang}</option>`).join('') || '<option>No browser voices found</option>';
}
function speak(text, slow=false){
  if(!('speechSynthesis' in window)){alert('Voice playback is not supported in this browser.'); return;}
  speechSynthesis.cancel();
  let u = new SpeechSynthesisUtterance(text);
  let selected = voices[Number($('voiceSelect').value)];
  if(selected) u.voice = selected;
  u.lang = selected && selected.lang ? selected.lang : 'de-DE';
  u.rate = slow ? 0.62 : Number($('voiceRate').value||0.82);
  u.pitch = Number($('voicePitch').value||1);
  speechSynthesis.speak(u);
}
if('speechSynthesis' in window){loadVoices(); speechSynthesis.onvoiceschanged=loadVoices;}

function selectedAnrede(){

        arr.push({
          id:`${r.thema}|${item.wort}|${vi}|${a}`,
          theme:r.thema, word:item.wort, variantIndex:vi, anrede:a,
          frage:a==='du'?v.frage_du:v.frage_sie,
          antwort:a==='du'?v.antwort_du:v.antwort_sie,
          frage_en:v.frage_en, antwort_en:v.antwort_en,
          raw:v
        });
      })
    })
  });
  return arr;
}
function modeKey(){return `${APP_VERSION}_${state.mode}_${$('themeSelect').value}_${$('anredeSelect').value}`;}
function deckKey(){return modeKey()+"_deck";}
function usedKey(){return modeKey()+"_used";}
function getDeck(){
  let pool=allItems().map(x=>x.id);
  let deck=JSON.parse(localStorage.getItem(deckKey())||'[]');
  let used=JSON.parse(localStorage.getItem(usedKey())||'[]');
  if(deck.length===0){
    let unused=pool.filter(id=>!used.includes(id));
    if(unused.length===0){used=[]; localStorage.setItem(usedKey(),JSON.stringify([])); unused=pool;}
    deck=shuffle(unused);
    localStorage.setItem(deckKey(),JSON.stringify(deck));
  }
  return deck;
}
function nextItem(){
  let pool=allItems();
  let deck=getDeck();
  let id=deck.shift();
  localStorage.setItem(deckKey(),JSON.stringify(deck));
  let used=JSON.parse(localStorage.getItem(usedKey())||'[]');
  used.push(id);
  localStorage.setItem(usedKey(),JSON.stringify(used));
  return pool.find(x=>x.id===id) || pool[0];
}
function deckInfo(){
  let total=allItems().length;
  let used=JSON.parse(localStorage.getItem(usedKey())||'[]').length;
  return {total,used:Math.min(used,total),remaining:Math.max(0,total-Math.min(used,total))};
}
function resetDeck(){localStorage.removeItem(deckKey());localStorage.removeItem(usedKey());state.sessionCount=0;render();}
function mistakeKey(){return APP_VERSION+"_mistakes";}
function getMistakes(){return JSON.parse(localStorage.getItem(mistakeKey())||'{}');}
function saveMistakes(m){localStorage.setItem(mistakeKey(),JSON.stringify(m));}
function addMistake(q, user=''){
  let m=getMistakes();
  m[q.id] = m[q.id] || {...q, attempts:0, lastUser:''};
  m[q.id].attempts++;
  m[q.id].lastUser=user;
  saveMistakes(m);
}
function removeMistake(id){let m=getMistakes(); delete m[id]; saveMistakes(m); render();}

function answerVariations(q){
  let a=q.antwort;
  let variations=[a];
  let n=norm(a);
  // Time first variation for answers with common time phrase
  let timePhrases=['am morgen','am abend','am sonntag','am samstag','am wochenende','am freitag','am montag','im august','im winter','im mai','jeden tag','jeden monat','um acht uhr','um zehn uhr','um sechs uhr'];
  timePhrases.forEach(tp=>{
    if(n.includes(tp) && n.startsWith('ich ')){
      let words=a.replace(/[.!?]/g,'').split(/\s+/);
      let phrase=tp.split(' ');
      let idx=n.split(' ').findIndex((w,i,arr)=>arr.slice(i,i+phrase.length).join(' ')===tp);
      if(idx>1){
        let original=a.replace(/[.!?]/g,'');
        let parts=original.split(/\s+/);
        let phraseWords=parts.slice(idx,idx+phrase.length);
        let before=parts.slice(0,idx);
        let after=parts.slice(idx+phrase.length);
        if(before.length>=2){
          variations.push(`${phraseWords.join(' ')} ${before[1]} ${before[0].toLowerCase()} ${after.join(' ')}`.replace(/\s+/g,' ').trim()+'.');
        }
      }
    }
  });
  // Simple "Ja," optional
  if(n.startsWith('ja ')) variations.push(a.replace(/^Ja,\s*/,''));
  return [...new Set(variations)];
}
function keyTokens(q){
  let qn=norm(q.antwort);
  let stop=new Set(['ich','du','sie','er','es','wir','ihr','der','die','das','den','dem','ein','eine','einen','einem','meine','mein','meinen','mir','mich','dir','ihnen','und','oder','am','im','in','auf','zu','mit','beim','zum','zur','ist','bin','sind','habe','hat','haben','esse','isst','essen','trinke','trinkt','kaufst','kaufe','kaufen','mache','machen','weil']);
  return qn.split(' ').filter(w=>w.length>2&&!stop.has(w)).slice(0,5);
}
function grammarScore(user,q){
  const u=norm(user), target=norm(q.antwort), vars=answerVariations(q).map(norm);
  if(vars.includes(u)) return {ok:true,score:100,status:'Exact or accepted variation'};
  let sim=similarity(u,target);
  let tokens=keyTokens(q);
  let tokenHits=tokens.filter(t=>u.includes(t)).length;
  let fullSentence = u.split(' ').length>=3;
  let startsOk = /^(ich|mein|meine|der|die|das|am|im|ja|nein|meine|wir|er|sie|es)\b/.test(u);
  let verbClue = ['bin','ist','sind','habe','hat','haben','esse','isst','essen','trinke','trinkt','kaufe','kauft','kaufen','gehe','geht','gehen','lerne','lernen','wohne','wohnt','wohnt','arbeitet','arbeite','mache','macht','feiere','besuche','besucht','möchte','brauche','kostet','schmeckt','hilft','helfe'].some(v=>u.split(' ').includes(v));
  let points = Math.round(sim*45 + (tokens.length?tokenHits/tokens.length*30:20) + (fullSentence?15:0) + (verbClue?10:0));
  return {ok:points>=72,score:Math.min(100,points),status: points>=72?'Likely acceptable':'Needs review', tokenHits, tokens, fullSentence, verbClue, startsOk, variations: answerVariations(q)};
}
function similarity(a,b){if(!a||!b)return 0;let aw=a.split(' '),bw=b.split(' ');let hits=aw.filter(w=>bw.includes(w)).length;return hits/Math.max(aw.length,bw.length);}
function analysisHtml(user,q,res){
  return `<div class="answer">Sample: ${q.antwort}</div><div class="translation">${q.antwort_en}</div><div>Your answer: <b>${user||'(empty)'}</b></div><div class="small">Flexible score: <b>${res.score}%</b> · ${res.status}</div><div class="small"><b>Expected keywords:</b> ${keyTokens(q).join(', ')||'simple answer'}</div>${res.variations&&res.variations.length>1?`<div class="small"><b>Accepted variations:</b><br>${res.variations.map(v=>'• '+v).join('<br>')}</div>`:''}${sentenceBreakdown(q)}<button class="btn" onclick="speak(state.current.antwort)">🔊 Play normal</button><button class="btn" onclick="speak(state.current.antwort,true)">🐢 Play slow</button>`;
}
function sentenceBreakdown(q){
  let parts=q.antwort.replace(/[.!?]/g,'').split(/\s+/);
  let chunks=parts.map((w,i)=>`<span class="hintChip">${i+1}. ${w}</span>`).join('');
  return `<div class="rule"><b>Sentence chunks</b><br>${chunks}</div>`;
}
function grammarBox(q){
  let f=norm(q.frage);
  let tips=[];
  if(f.startsWith('wann')) tips.push('<b>Wann</b> asks time. Answer can use am Morgen, am Sonntag, um acht Uhr.');
  if(f.startsWith('woher')) tips.push('<b>Woher</b> asks origin. Use aus + Dativ or von.');
  if(f.startsWith('wohin')) tips.push('<b>Wohin</b> asks direction. Often use in + Akkusativ or nach + city.');
  if(f.startsWith('wo ')) tips.push('<b>Wo</b> asks location. Use in, im, bei, zu Hause, auf dem Markt.');
  if(f.startsWith('wie viel')) tips.push('<b>Wie viel</b> asks amount or price. Use kostet or quantity.');
  if(f.startsWith('wie viele')) tips.push('<b>Wie viele</b> asks countable plural. Answer with a number.');
  if(f.startsWith('warum')) tips.push('<b>Warum</b> asks reason. A1 answer can use weil + simple clause.');
  if(f.startsWith('mit wem')) tips.push('<b>Mit wem</b>: mit + Dativ. Example: mit meiner Familie.');
  if(f.includes('schmeckt')) tips.push('<b>schmecken</b>: Der Kuchen schmeckt mir gut.');
  if(f.includes('hilft')||f.includes('helfen')) tips.push('<b>helfen</b> uses Dativ: mir, dir, meiner Mutter.');
  if(f.includes('kostet')) tips.push('<b>kosten</b>: Der Kaffee kostet drei Euro.');
  if(!tips.length) tips.push('Use a full A1 sentence: subject + conjugated verb + extra information.');
  return `<div class="rule"><b>Mini grammar reminder</b><br>${tips.join('<br>')}</div>`;
}

function renderExamQuestion(){
  clearInterval(state.timer);
  let ex=state.exam;
  if(ex.index>=ex.questions.length){examEnd();return;}
  state.current=ex.questions[ex.index]; state.timeLeft=30;
  shell(`<div class="kicker">Exam Mode · Question ${ex.index+1} of ${ex.questions.length}</div><div class="timer" id="timer">30</div><div class="questionBox"><span class="wordTag">${state.current.word}</span><div class="question">${state.current.frage}</div><button class="btn" onclick="speak(state.current.frage)">🔊 Play question</button></div><div class="prompt">Answer without hints. Sample appears only after you submit.</div><textarea id="answerInput" class="textarea" placeholder="Type your exam answer..."></textarea><div id="feedback" class="feedback"></div><div class="btnrow"><button class="btn primary" onclick="submitExam()">Submit</button></div>`,state.current);
  $('answerInput').focus(); state.timer=setInterval(()=>{state.timeLeft--; $('timer').textContent=state.timeLeft; if(state.timeLeft<=10)$('timer').classList.add('danger'); if(state.timeLeft<=0){submitExam(true)}},1000);

function submitExam(timeout=false){

  if(ok)state.exam.correct++; else {state.exam.wrong++; addMistake(state.current,val||'timeout');}
  state.exam.results.push({q:state.current,user:val,ok,score:res.score,timeout});
  feedback(ok?'good':'bad',`${timeout?'<b>Time is up.</b>':(ok?'<b>Likely correct.</b>':'<b>Needs review.</b>')}${analysisHtml(val,state.current,res)}<div class="btnrow"><button class="btn primary" onclick="state.exam.index++;renderExamQuestion()">Next exam question</button></div>`);

}
function theoryMode(){
  $('content').innerHTML=`<div class="card"><div class="kicker">Theory</div><div class="big" style="font-size:36px">How to answer A1 speaking questions</div><table><tr><th>Question</th><th>Meaning</th><th>Answer pattern</th></tr><tr><td>Wann?</td><td>When?</td><td>Ich ... am Morgen / um acht Uhr.</td></tr><tr><td>Wo?</td><td>Where?</td><td>Ich ... im Supermarkt / zu Hause.</td></tr><tr><td>Woher?</td><td>Where from?</td><td>Ich komme aus ...</td></tr><tr><td>Wohin?</td><td>Where to?</td><td>Ich gehe in die Schule / nach Berlin.</td></tr><tr><td>Wie viel?</td><td>How much?</td><td>Es kostet ... / Ich trinke ...</td></tr><tr><td>Wie viele?</td><td>How many?</td><td>Ich habe zwei ...</td></tr><tr><td>Warum?</td><td>Why?</td><td>Ich ..., weil es gut ist.</td></tr><tr><td>Mit wem?</td><td>With whom?</td><td>mit meiner Familie, mit meinem Vater</td></tr></table><div class="modeNote"><b>Recommended routine:</b><br>1. Study Cards with audio<br>2. Type Answer, 30 questions<br>3. Listen & Answer, 30 questions<br>4. Speaking Mode, 10 to 20 questions<br>5. Exam Mode once daily</div><div class="rule"><b>Question bank:</b><br>5 themes · 109 vocabulary cards · 327 question variants per Du/Sie.</div></div>`;
}
function escapeJS(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ');}
function render(){clearInterval(state.timer);setActive();if(state.mode==='type')typeMode();if(state.mode==='build')buildMode();if(state.mode==='listen')listenMode();if(state.mode==='speak')speakMode();if(state.mode==='exam')examMode();if(state.mode==='mistakes')mistakesMode();if(state.mode==='cards')cardsMode();if(state.mode==='progress')progressMode();if(state.mode==='theory')theoryMode();}
document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;state.sessionCount=0;state.exam=null;render();});
initControls();
render();
</script>
