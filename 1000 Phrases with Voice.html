<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1000 German Phrases — A1 Level</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap');
:root {
  --bg:#080810;--surface:#0f0f1a;--card:#151525;--border:#1e1e32;
  --gold:#f5c842;--gold2:#fad96e;--green:#3dd68c;--blue:#5ab4ff;
  --red:#ff5f5f;--purple:#b06aff;--text:#e8e8f0;--muted:#5a5a7a;--dim:#2a2a45;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}

/* ── HERO ── */
.hero{text-align:center;padding:48px 20px 32px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(245,200,66,0.08),transparent);pointer-events:none}
.hero-flag{font-size:56px;margin-bottom:16px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(28px,6vw,48px);font-weight:900;color:var(--gold);line-height:1.15;margin-bottom:10px}
.hero h1 em{font-style:italic;color:var(--gold2)}
.hero p{color:var(--muted);font-size:15px;max-width:480px;margin:0 auto;line-height:1.6}
.hero-stats{display:flex;justify-content:center;gap:32px;margin-top:24px}
.hero-stat{text-align:center}
.hero-stat-num{font-size:28px;font-weight:900;color:var(--gold)}
.hero-stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

/* ── CONTROLS ── */
.controls{position:sticky;top:0;z-index:100;background:rgba(8,8,16,0.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.search-wrap{flex:1;min-width:180px;position:relative}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px 10px 38px;font-size:14px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s}
.search-wrap input:focus{border-color:var(--gold)}
.search-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
.search-wrap input::placeholder{color:var(--muted)}
.btn-ctrl{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 14px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all 0.2s}
.btn-ctrl:hover,.btn-ctrl.active{background:rgba(245,200,66,0.1);border-color:var(--gold);color:var(--gold)}
.count-badge{background:var(--dim);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap}
.count-badge span{color:var(--gold)}

/* ── FILTER TABS ── */
.filter-wrap{padding:12px 16px;display:flex;gap:8px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--surface)}
.filter-wrap::-webkit-scrollbar{display:none}
.ftab{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0}
.ftab.active{background:rgba(245,200,66,0.12);border-color:var(--gold);color:var(--gold)}

/* ── CATEGORY SECTION ── */
.cat-section{margin:0 16px 32px}
.cat-header{display:flex;align-items:center;gap:12px;padding:20px 0 12px;border-bottom:1px solid var(--border);margin-bottom:12px;position:sticky;top:58px;background:var(--bg);z-index:10}
.cat-icon{font-size:24px}
.cat-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text)}
.cat-count{margin-left:auto;background:var(--dim);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;color:var(--muted)}

/* ── PHRASE GRID ── */
.phrase-grid{display:grid;grid-template-columns:1fr;gap:8px}
@media(min-width:640px){.phrase-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:960px){.phrase-grid{grid-template-columns:repeat(3,1fr)}}

/* ── PHRASE CARD ── */
.phrase-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.phrase-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.2s;border-radius:14px}
.phrase-card:hover::before,.phrase-card:active::before{opacity:1}
.phrase-card:hover{transform:translateY(-1px);border-color:var(--dim)}
.phrase-card:active{transform:scale(0.98)}
.phrase-num{font-size:10px;font-weight:700;color:var(--muted);font-family:'Courier New',monospace;min-width:34px;padding-top:2px}
.phrase-body{flex:1;min-width:0}
.phrase-de{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;line-height:1.4}
.phrase-en{font-size:12px;color:var(--muted);line-height:1.4}
.phrase-card.playing .phrase-de{color:var(--gold)}
.phrase-card.playing{border-color:rgba(245,200,66,0.3);background:rgba(245,200,66,0.04)}
.sound-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--dim);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all 0.2s;cursor:pointer}
.phrase-card:hover .sound-btn,.phrase-card.playing .sound-btn{background:rgba(245,200,66,0.15);border-color:rgba(245,200,66,0.4)}
.phrase-card.fav .phrase-num{color:var(--gold)}

/* ── FAV BTN ── */
.fav-btn{position:absolute;top:8px;right:8px;font-size:13px;opacity:0;transition:opacity 0.2s;cursor:pointer;background:none;border:none;padding:2px}
.phrase-card:hover .fav-btn{opacity:1}
.phrase-card.fav .fav-btn{opacity:1;color:var(--gold)}

/* ── PROGRESS BAR ── */
.progress-bar{height:2px;background:var(--dim);position:fixed;top:0;left:0;right:0;z-index:200}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));width:0%;transition:width 0.3s}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--gold);color:var(--gold);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:700;z-index:999;white-space:nowrap;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}

/* ── BOTTOM PAD ── */
.bottom-pad{height:60px}

/* ── NO RESULTS ── */
.no-results{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px}
.no-results span{font-size:48px;display:block;margin-bottom:16px}

/* ── SCROLL TOP ── */
.scroll-top{position:fixed;bottom:24px;right:16px;width:42px;height:42px;border-radius:50%;background:var(--gold);border:none;color:var(--bg);font-size:20px;cursor:pointer;display:none;align-items:center;justify-content:center;font-weight:900;z-index:100;box-shadow:0 4px 16px rgba(245,200,66,0.3)}
.scroll-top.visible{display:flex}

/* ── QUIZ MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:540px;max-height:80vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:var(--dim);border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gold);margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.quiz-de{font-size:22px;font-weight:800;color:var(--text);margin-bottom:20px;text-align:center;padding:20px;background:var(--card);border-radius:14px;border:1px solid var(--border)}
.quiz-opts{display:flex;flex-direction:column;gap:10px}
.quiz-opt{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;font-size:14px;cursor:pointer;transition:all 0.2s}
.quiz-opt.correct{border-color:var(--green);background:rgba(61,214,140,0.08);color:var(--green)}
.quiz-opt.wrong{border-color:var(--red);background:rgba(255,95,95,0.08);color:var(--red)}
.quiz-score{display:flex;justify-content:space-between;margin-bottom:20px;font-size:13px}
.quiz-score span{color:var(--muted)}
.quiz-score b{color:var(--gold)}
</style>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="hero">
  <div class="hero-flag">🇩🇪</div>
  <h1>1000 German Phrases<br><em>A1 Level Mastery</em></h1>
  <p>Every essential phrase you need — tap any card to hear authentic German pronunciation</p>
  <div class="hero-stats">
    <div class="hero-stat"><div class="hero-stat-num">1000</div><div class="hero-stat-label">Phrases</div></div>
    <div class="hero-stat"><div class="hero-stat-num" id="learnedCount">0</div><div class="hero-stat-label">Heard</div></div>
    <div class="hero-stat"><div class="hero-stat-num" id="favCount">0</div><div class="hero-stat-label">Saved ⭐</div></div>
  </div>
</div>

<div class="controls">
  <div class="search-wrap"><input type="search" id="searchBox" placeholder="Search phrases..." oninput="handleSearch()"></div>

  <button class="btn-ctrl" onclick="openQuiz()">🧠 Quiz</button>

</div>

<div class="filter-wrap" id="filterTabs"></div>

<div id="phraseContainer"></div>
<div class="bottom-pad"></div>

<button class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<div class="toast" id="toast"></div>

<!-- QUIZ MODAL -->
<div class="modal-overlay" id="quizOverlay" onclick="closeQuiz(event)">

    <div class="quiz-opts" id="qOpts"></div>
  </div>
</div>

// ─── BUILD PHRASE LIST ───────────────────────────────────────
let allPhrases = [];
let phraseNum = 1;
CATEGORIES.forEach(cat => {
  cat.phrases.forEach(p => {
    allPhrases.push({ id: phraseNum, cat: cat.id, de: p[0], en: p[1] });
    phraseNum++;
  });
});

// ─── STATE ───────────────────────────────────────────────────
let heard = new Set(JSON.parse(localStorage.getItem('de_heard')||'[]'));
let favs  = new Set(JSON.parse(localStorage.getItem('de_favs') ||'[]'));
let activeFilter = 'all';
let showFavsOnly = false;
let searchQ = '';
let quizScore = 0, quizTotal = 0, quizStreak = 0;

function saveHeard(){ localStorage.setItem('de_heard', JSON.stringify([...heard])); }
function saveFavs(){ localStorage.setItem('de_favs', JSON.stringify([...favs])); }

// ─── SPEECH ──────────────────────────────────────────────────
function speak(text, btn) {
  if (!window.speechSynthesis) { showToast('Speech not supported in this browser'); return; }
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'de-DE'; utter.rate = 0.85; utter.pitch = 1;
  speechSynthesis.cancel();
  if (btn) { btn.textContent = '⏸'; setTimeout(() => btn.textContent = '🔊', 2000); }
  speechSynthesis.speak(utter);
}

// ─── FILTER TABS ─────────────────────────────────────────────
function buildFilterTabs() {
  const wrap = document.getElementById('filterTabs');
  let html = `<div class="ftab active" id="ftab-all" onclick="setFilter('all')">All (${allPhrases.length})</div>`;
  CATEGORIES.forEach(cat => {
    html += `<div class="ftab" id="ftab-${cat.id}" onclick="setFilter('${cat.id}')">${cat.icon} ${cat.title}</div>`;
  });
  wrap.innerHTML = html;
}

function setFilter(id) {
  activeFilter = id;
  showFavsOnly = false;
  document.getElementById('btnFavs').classList.remove('active');
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  document.getElementById('ftab-' + id)?.classList.add('active');
  renderAll();
}

// ─── RENDER ──────────────────────────────────────────────────
function getFiltered() {
  return allPhrases.filter(p => {
    if (showFavsOnly && !favs.has(p.id)) return false;
    if (activeFilter !== 'all' && p.cat !== activeFilter) return false;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      return p.de.toLowerCase().includes(q) || p.en.toLowerCase().includes(q);
    }
    return true;
  });
}

function renderAll() {
  const filtered = getFiltered();
  document.getElementById('visibleCount').textContent = filtered.length;
  document.getElementById('learnedCount').textContent = heard.size;
  document.getElementById('favCount').textContent = favs.size;
  document.getElementById('progressFill').style.width = (heard.size / allPhrases.length * 100) + '%';

  const container = document.getElementById('phraseContainer');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results"><span>🔍</span>Keine Ergebnisse. Try a different search!</div>';
    return;
  }

  // group by category
  const byCat = {};
  filtered.forEach(p => { if (!byCat[p.cat]) byCat[p.cat] = []; byCat[p.cat].push(p); });

  let html = '';
  CATEGORIES.forEach(cat => {
    if (!byCat[cat.id]) return;
    html += `<div class="cat-section" id="sec-${cat.id}">
      <div class="cat-header">
        <div class="cat-icon">${cat.icon}</div>
        <div class="cat-title">${cat.title}</div>
        <div class="cat-count">${byCat[cat.id].length}</div>
      </div>
      <div class="phrase-grid">`;
    byCat[cat.id].forEach(p => {
      const isHeard = heard.has(p.id);
      const isFav  = favs.has(p.id);
      html += `<div class="phrase-card${isFav?' fav':''}" id="pc-${p.id}" onclick="handleClick(${p.id},'${escQ(p.de)}')">
        <div class="phrase-num">${String(p.id).padStart(4,'0')}</div>
        <div class="phrase-body">
          <div class="phrase-de">${p.de}</div>
          <div class="phrase-en">${p.en}</div>
        </div>
        <div class="sound-btn" onclick="event.stopPropagation();handleSpeak(${p.id},'${escQ(p.de)}',this)">🔊</div>
        <button class="fav-btn" onclick="event.stopPropagation();toggleFav(${p.id})" title="Save">${isFav?'⭐':'☆'}</button>
      </div>`;
    });
    html += '</div></div>';
  });
  container.innerHTML = html;
}

function escQ(s){ return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function handleSpeak(id, text, btn){
  heard.add(id); saveHeard(); saveHeard();
  document.getElementById('pc-'+id)?.classList.add('playing');
  setTimeout(()=>document.getElementById('pc-'+id)?.classList.remove('playing'),2200);
  speak(text, btn);
  document.getElementById('learnedCount').textContent = heard.size;
  document.getElementById('progressFill').style.width = (heard.size / allPhrases.length * 100) + '%';
}

function handleClick(id, text){ handleSpeak(id, text, null); }

function toggleFav(id){
  if(favs.has(id)){ favs.delete(id); } else { favs.add(id); showToast('⭐ Saved!'); }
  saveFavs();
  document.getElementById('favCount').textContent = favs.size;
  const card = document.getElementById('pc-'+id);
  if(card){
    card.classList.toggle('fav', favs.has(id));
    card.querySelector('.fav-btn').textContent = favs.has(id) ? '⭐' : '☆';
  }
}

function toggleFavView(){
  showFavsOnly = !showFavsOnly;
  document.getElementById('btnFavs').classList.toggle('active', showFavsOnly);
  if(showFavsOnly){ activeFilter='all'; document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active')); document.getElementById('ftab-all')?.classList.add('active'); }
  renderAll();
}

function handleSearch(){
  searchQ = document.getElementById('searchBox').value.trim();
  renderAll();
}

function shuffleAll(){
  allPhrases = allPhrases.sort(()=>Math.random()-0.5);
  showToast('🔀 Phrases shuffled!');
  renderAll();
}

// ─── TOAST ───────────────────────────────────────────────────
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ─── QUIZ ────────────────────────────────────────────────────
let quizCurrent = null;
function openQuiz(){
  document.getElementById('quizOverlay').classList.add('open');
  nextQuiz();
}
function closeQuiz(e){ if(e.target===document.getElementById('quizOverlay')) document.getElementById('quizOverlay').classList.remove('open'); }

function nextQuiz(){
  const pool = allPhrases.filter(p=>p.de.length<40);
  quizCurrent = pool[Math.floor(Math.random()*pool.length)];
  document.getElementById('qPhrase').textContent = quizCurrent.de;
  document.getElementById('qScore').textContent = quizScore;
  document.getElementById('qTotal').textContent = quizTotal;
  document.getElementById('qStreak').innerHTML = 'Streak: <b>'+quizStreak+'</b> 🔥';
  // 4 options
  const wrongs = pool.filter(p=>p.id!==quizCurrent.id).sort(()=>Math.random()-0.5).slice(0,3).map(p=>p.en);
  const opts = [...wrongs, quizCurrent.en].sort(()=>Math.random()-0.5);
  const optsEl = document.getElementById('qOpts');
  optsEl.innerHTML = opts.map(o=>`<div class="quiz-opt" onclick="answerQuiz(this,'${escQ(o)}','${escQ(quizCurrent.en)}')">${o}</div>`).join('');
  speak(quizCurrent.de);
}

function answerQuiz(el, selected, correct){
  if(el.classList.contains('correct')||el.classList.contains('wrong')) return;
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(o=>o.style.pointerEvents='none');
  quizTotal++;
  if(selected===correct){
    el.classList.add('correct'); quizScore++; quizStreak++;
    showToast('✅ Richtig! +1');
  } else {
    el.classList.add('wrong'); quizStreak=0;
    opts.forEach(o=>{ if(o.textContent===correct) o.classList.add('correct'); });
    showToast('❌ Falsch!');
  }
  document.getElementById('qScore').textContent = quizScore;
  document.getElementById('qTotal').textContent = quizTotal;
  document.getElementById('qStreak').innerHTML = 'Streak: <b>'+quizStreak+'</b> 🔥';
  setTimeout(nextQuiz, 1800);
}

// ─── SCROLL ──────────────────────────────────────────────────
window.addEventListener('scroll',()=>{
  document.getElementById('scrollTopBtn').classList.toggle('visible', window.scrollY>400);
});

// ─── INIT ────────────────────────────────────────────────────
buildFilterTabs();
renderAll();
</script>
