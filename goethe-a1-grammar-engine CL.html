<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Goethe A1 Grammar Engine</title>
<style>
:root{--bg:#f8f1e8;--card:#fffaf4;--ink:#21170f;--muted:#806f61;--line:#dfcbb6;--accent:#b85f42;--good:#167445;--bad:#af3737;--soft:#f0dfcb;
--der:#2E5C8A;--der-soft:#dde8f3;--die:#A23E5C;--die-soft:#f6e1e8;--das:#3E7A52;--das-soft:#e1ecdf;--plural:#7B5EA7;--plural-soft:#ece4f3}
*{box-sizing:border-box}
body{margin:0;font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;background:var(--bg);color:var(--ink)}
header,.app{max-width:1180px;margin:auto;padding:22px 24px}
.eyebrow{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;text-transform:uppercase;letter-spacing:.16em;color:#9b3f24;font-weight:900;font-size:13px;margin-bottom:8px}
h1{font-size:clamp(30px,4vw,48px);margin:0 0 8px;line-height:1.05}
.sub{color:var(--muted);line-height:1.45;font-size:16px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.nav{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:18px 0}
.btn{border:0;border-radius:10px;padding:15px 12px;font-weight:900;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#fffdf9;border:1px solid var(--line);color:#111;min-height:56px}
.btn:hover{background:#fff6eb;border-color:#cda98b}
.btn.active,.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:0 12px 28px rgba(73,43,20,.06);margin-bottom:16px}
.grid{display:grid;grid-template-columns:1.12fr .88fr;gap:16px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
.kicker{text-transform:uppercase;letter-spacing:.1em;font-size:12px;color:#9b3f24;font-weight:900;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.big{font-size:clamp(32px,5.5vw,68px);font-weight:950;margin:12px 0 4px;line-height:1.05}
.meaning{font-size:18px;color:var(--muted);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.prompt{font-size:24px;font-weight:850;margin:14px 0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.options{display:grid;gap:10px}
.option{width:100%;padding:15px 16px;border-radius:14px;border:1px solid var(--line);background:white;text-align:left;font-size:18px;font-weight:850;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.option:hover{border-color:var(--accent);background:#fff9f2}
.option.correct{background:#e9f7ef;border-color:var(--good);color:var(--good)}
.option.wrong{background:#fdecec;border-color:var(--bad);color:var(--bad)}
.feedback{display:none;margin-top:15px;background:white;border:1px solid var(--line);border-radius:16px;padding:14px;line-height:1.55;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.feedback.good{background:#eefaf3;border-color:#b9e6cc}
.feedback.bad{background:#fff0f0;border-color:#f0bcbc}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.controls .btn{min-height:auto;padding:12px 16px;border-radius:999px}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.stat b{display:block;font-size:28px}
.rule{background:#fff;border:1px solid var(--line);border-radius:16px;padding:13px;line-height:1.5;margin-top:10px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.tilegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}
.tile{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;text-align:left;line-height:1.45;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.badge{display:inline-block;background:var(--soft);border-radius:999px;padding:4px 9px;margin:2px;font-size:12px;font-weight:850;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.wordchip{display:inline-block;background:white;border:1px solid var(--line);border-radius:999px;padding:10px 14px;margin:4px;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-weight:850}
.answerBox{min-height:54px;background:#fff;border:1px dashed var(--accent);border-radius:16px;padding:10px;margin:12px 0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.small{font-size:13px;color:var(--muted);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}

.caseTable{
    width:100%;
    border-collapse:separate;
    border-spacing:0;
    overflow:hidden;
    border-radius:16px;
    border:1px solid var(--line);
    background:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    margin:12px 0;
}
.caseTable th,
.caseTable td{
    padding:12px 10px;
    border-bottom:1px solid var(--line);
    border-right:1px solid var(--line);
    text-align:center;
    white-space:normal;
}
.caseTable th{
    background:#f0dfcb;
    color:#3b2416;
    font-weight:900;
}
.caseTable td:first-child,
.caseTable th:first-child{
    text-align:left;
    font-weight:900;
}
.caseTable tr:last-child td{
    border-bottom:0;
}
.caseTable th:last-child,
.caseTable td:last-child{
    border-right:0;
}
.caseTable .changed{
    background:#fff1e8;
    color:#9b3f24;
    font-weight:900;
}
.caseTable .same{
    color:#167445;
    font-weight:900;
}
.caseNote{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    color:var(--muted);
    font-size:14px;
    line-height:1.45;
    margin-top:8px;
}
.miniTable{
    width:100%;
    border-collapse:separate;
    border-spacing:0;
    overflow:hidden;
    border-radius:14px;
    border:1px solid var(--line);
    background:white;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    margin-top:10px;
}
.miniTable th,.miniTable td{
    padding:10px 8px;
    border-bottom:1px solid var(--line);
    border-right:1px solid var(--line);
    text-align:center;
}
.miniTable th{
    background:#f0dfcb;
}
.miniTable tr:last-child td{border-bottom:0}
.miniTable th:last-child,.miniTable td:last-child{border-right:0}


.theoryBlock{
    background:#fff;
    border:1px solid var(--line);
    border-radius:18px;
    padding:18px;
    margin:14px 0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    line-height:1.55;
}
.theoryBlock h2{
    margin:0 0 8px;
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    font-size:28px;
}
.theoryBlock h3{
    margin:16px 0 8px;
    font-size:18px;
}
.theoryBlock p{
    margin:8px 0;
}
.exampleGrid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:10px;
    margin-top:10px;
}
.exampleCard{
    background:#fffaf4;
    border:1px solid var(--line);
    border-radius:14px;
    padding:12px;
}
.callout{
    background:#fff1e8;
    border:1px solid #e2b092;
    border-radius:14px;
    padding:12px;
    margin-top:10px;
}
.formula{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:#f0dfcb;
    border-radius:12px;
    padding:10px;
    font-weight:900;
    margin:8px 0;
}


.sideTitle{
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    font-size:20px;
    font-weight:900;
    margin:0 0 8px;
}
.sideMini{
    width:100%;
    border-collapse:separate;
    border-spacing:0;
    overflow:hidden;
    border-radius:14px;
    border:1px solid var(--line);
    background:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    margin:10px 0;
    font-size:14px;
}
.sideMini th,.sideMini td{
    padding:9px 8px;
    border-bottom:1px solid var(--line);
    border-right:1px solid var(--line);
    text-align:center;
    white-space:normal;
}
.sideMini th{
    background:#f0dfcb;
    color:#3b2416;
    font-weight:900;
}
.sideMini td:first-child,.sideMini th:first-child{
    text-align:left;
    font-weight:900;
}
.sideMini tr:last-child td{border-bottom:0}
.sideMini th:last-child,.sideMini td:last-child{border-right:0}
.sideMini .hot{
    background:#fff1e8;
    color:#9b3f24;
    font-weight:900;
}
.sideMini .ok{
    color:#167445;
    font-weight:900;
}
.prepList{
    display:grid;
    gap:8px;
    margin-top:10px;
}
.prepItem{
    background:#fff;
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    line-height:1.4;
}
.prepItem b{
    color:#9b3f24;
}
.topicHint{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    color:var(--muted);
    line-height:1.45;
    font-size:14px;
    margin-top:8px;
}
.hintToggle{
    display:inline-flex;
    align-items:center;
    gap:7px;
    background:#fffaf4;
    border:1.5px dashed var(--accent);
    color:#9b3f24;
    border-radius:999px;
    padding:9px 16px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    font-weight:850;
    font-size:13.5px;
    cursor:pointer;
    margin:6px 0 0;
}
.hintToggle:hover{background:#fff1e2;border-style:solid;}
.hintPanel{
    display:none;
    margin-top:8px;
    background:#fff8ef;
    border:1px solid var(--line);
    border-left:4px solid var(--accent);
    border-radius:14px;
    padding:13px 15px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    font-size:14.5px;
    line-height:1.55;
    color:#4a3826;
}
.hintPanel.open{display:block;}
.hintWrap{margin:10px 0 4px;}

.declTable{
    width:100%;
    border-collapse:separate;
    border-spacing:0;
    overflow:hidden;
    border-radius:16px;
    border:1px solid var(--line);
    background:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    margin:10px 0;
}
.declTable th,.declTable td{
    padding:11px 9px;
    border-bottom:1px solid var(--line);
    border-right:1px solid var(--line);
    text-align:center;
}
.declTable th{background:#f0dfcb;color:#3b2416;font-weight:900;}
.declTable td:first-child,.declTable th:first-child{text-align:left;font-weight:900;background:#fbf2e6;}
.declTable tr:last-child td{border-bottom:0;}
.declTable th:last-child,.declTable td:last-child{border-right:0;}
.declSection{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-weight:900;color:#9b3f24;margin:14px 0 4px;font-size:14px;text-transform:uppercase;letter-spacing:.06em;}
.verbList{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-top:10px;}
.verbItem{background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 13px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;line-height:1.45;}
.verbItem b{color:#9b3f24;}

.genderTable th:nth-child(2),.genderTable td:nth-child(2):not(.changed):not(.hot){color:var(--der);}
.genderTable th:nth-child(3),.genderTable td:nth-child(3):not(.changed):not(.hot){color:var(--die);}
.genderTable th:nth-child(4),.genderTable td:nth-child(4):not(.changed):not(.hot){color:var(--das);}
.genderTable th:nth-child(5),.genderTable td:nth-child(5):not(.changed):not(.hot){color:var(--plural);}
.genderTable th{font-weight:900;}
.genderKey{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0 4px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-size:13px;font-weight:850;}
.genderKey span{display:inline-flex;align-items:center;gap:6px;}
.genderKey i{width:11px;height:11px;border-radius:3px;display:inline-block;}
.option.gM{border-left:6px solid var(--der);}
.option.gF{border-left:6px solid var(--die);}
.option.gN{border-left:6px solid var(--das);}
.option.gPl{border-left:6px solid var(--plural);}
.option.gM.correct,.option.gF.correct,.option.gN.correct,.option.gPl.correct{border-left-color:var(--good);}
.option.gM.wrong,.option.gF.wrong,.option.gN.wrong,.option.gPl.wrong{border-left-color:var(--bad);}

</style>
</head>
<body>
<header>
<div class="eyebrow">GOETHE A1 · GRAMMAR ENGINE</div>
<h1>German A1 Grammar Trainer</h1>
<div class="sub">Cases, prepositions, pronouns, possessives, negation, word order, question words, adjective endings, sentence patterns, and clear theory explanations.</div>
</header>

<main class="app">
<div class="nav">
<button class="btn active" data-mode="caseArticle">Cases Articles</button>
<button class="btn" data-mode="caseIdentify">Identify Case</button>
<button class="btn" data-mode="preposition">Prepositions</button>
<button class="btn" data-mode="twoWay">Two Way Prep</button>
<button class="btn" data-mode="pronoun">Pronouns</button>
<button class="btn" data-mode="possessive">Possessives</button>
<button class="btn" data-mode="negation">Negation</button>
<button class="btn" data-mode="wordOrder">Word Order</button>
<button class="btn" data-mode="questionWords">W Questions</button>
<button class="btn" data-mode="adjectiveEnding">Adjective Endings</button>
<button class="btn" data-mode="patterns">Sentence Patterns</button>
<button class="btn" data-mode="rules">Theory & Rules</button>
</div>
<div id="content"></div>
</main>

function setBase(label, word, hint, prompt, hintText){

    f.style.display='block';

}
function answer(btn, ok, fb){
    if(state.answered)return;

    else{state.streak=0;btn.classList.add('wrong');document.querySelectorAll('.option').forEach(x=>{if(x.dataset.ok==='1')x.classList.add('correct');});}

function caseArticleQ(){
    let q=pick(DATA.caseArticles);
    setBase('Cases Articles', q.sentence, '', 'Choose the correct article.',
      `This sentence is <b>${q.case}</b>.<br>Base form (Nominativ): <b>${q.hint}</b>. Now work out how that article changes in ${q.case}.`);
    choices(q.answer,['der','die','das','den','dem','einen','eine','einem']).forEach(c=>opt(c,c===q.answer,`Answer: <b>${q.answer}</b>.<br>${q.explain}`,ARTICLE_GENDER[c]));
}

    let q=pick(DATA.caseIdentify);
    setBase('Identify Case', q.sentence, 'Which case is used here?', 'Choose the case.',
      `<b>Nominativ</b> = the subject, who or what is doing the action.<br><b>Akkusativ</b> = the direct object, who or what receives the action.<br><b>Dativ</b> = the indirect object, or after a fixed-dative verb/preposition (helfen, mit, aus, bei...).`);
    ['Nominativ','Akkusativ','Dativ'].forEach(c=>opt(c,c===q.answer,`Answer: <b>${q.answer}</b>.<br>${q.explain}`));
}

    setBase('Prepositions', q.prep, q.meaning, 'Which case does this preposition take?',
      `Example: "${q.sentence}"<br>Tip: a small fixed group always takes Akkusativ (durch, für, gegen, ohne, um); a larger fixed group always takes Dativ (aus, bei, mit, nach, seit, von, zu).`);
    ['Akkusativ','Dativ','Nominativ'].forEach(c=>opt(c,c===q.case,`<b>${q.prep}</b> uses <b>${q.case}</b>.<br>${q.sentence}`));
}
function twoWayQ(){
    let q=pick(DATA.twoWay);
    let askMove=Math.random()<.5;
    let sent=askMove?q.movement:q.location;
    setBase('Two Way Prepositions', sent, `${q.prep} = ${q.meaning}`, 'Is this movement or location?',
      `<b>Wohin?</b> (movement, a change of place) &rarr; Akkusativ.<br><b>Wo?</b> (location, staying in one place) &rarr; Dativ.<br>Look closely at the article in the sentence above — it already tells you the case.`);
    ['Movement · Akkusativ','Location · Dativ'].forEach(c=>{
        let ok=(askMove && c==='Movement · Akkusativ') || (!askMove && c==='Location · Dativ');
        opt(c,ok,`Movement answers wohin and uses Akkusativ.<br>Location answers wo and uses Dativ.<br><br>Movement: ${q.movement}<br>Location: ${q.location}`);
    });
}
function pronounQ(){
    let p=pick(DATA.pronouns);
    let useDat=Math.random()<.5;
    let sent=useDat?'Ich helfe ___.':'Ich sehe ___.';
    let ans=useDat?p.dat:p.akk;
    setBase('Personal Pronouns', sent, `Base pronoun: ${p.nom}`, `Choose the ${useDat?'Dativ':'Akkusativ'} pronoun.`,
      `${p.nom} &rarr; Akkusativ: <b>${p.akk}</b> &middot; Dativ: <b>${p.dat}</b>`);
    choices(ans,DATA.pronouns.flatMap(x=>[x.akk,x.dat])).forEach(c=>opt(c,c===ans,`Answer: <b>${ans}</b>.<br>Akkusativ: ${p.akk}<br>Dativ: ${p.dat}`));
}
function possessiveQ(){
    let p=pick(DATA.possessives);
    let types=[['nomM','Das ist ___ Vater.','masculine Nominativ'],['nomF','Das ist ___ Mutter.','feminine Nominativ'],['nomN','Das ist ___ Kind.','neuter Nominativ'],['akkM','Ich sehe ___ Vater.','masculine Akkusativ'],['datF','Ich helfe ___ Mutter.','feminine Dativ']];
    let t=pick(types);
    let ans=p[t[0]];
    setBase('Possessives', t[1], `Owner: ${p.owner}`, 'Choose the correct possessive article.',
      `This blank needs <b>${t[2]}</b>. Figure out the gender from the noun, and the case from the verb (sehen = Akkusativ, helfen = Dativ, sein = Nominativ).`);
    choices(ans,DATA.possessives.flatMap(x=>[x.nomM,x.nomF,x.nomN,x.akkM,x.datF])).forEach(c=>opt(c,c===ans,`Answer: <b>${ans}</b>.<br>Owner: ${p.owner} · ${t[2]}`));
}

function wordOrderQ(){
    let q=pick(DATA.wordOrder);
    shell();
    $('modeLabel').textContent='Word Order';
    $('word').textContent=q.type;
    $('hint').textContent='Click the words in correct order.';
    $('prompt').innerHTML='Build the sentence.';
    $('hintArea').innerHTML = hintBlock(`Rule for this pattern: ${q.explain}`);
    wireHintToggle();
    state.buildWords=[...q.words];
    state.buildAnswer=[];
    $('answers').innerHTML=`<div class="answerBox" id="answerBox"></div><div id="chips"></div><div class="controls"><button class="btn primary" id="checkOrder">Check</button><button class="btn" id="resetOrder">Reset</button></div>`;
    function draw(){
        $('answerBox').innerHTML=state.buildAnswer.map(w=>`<span class="badge">${w}</span>`).join(' ');
        $('chips').innerHTML=state.buildWords.map((w,i)=>`<span class="wordchip" data-i="${i}">${w}</span>`).join('');
        document.querySelectorAll('.wordchip').forEach(ch=>ch.onclick=()=>{
            let i=Number(ch.dataset.i);
            state.buildAnswer.push(state.buildWords[i]);
            state.buildWords.splice(i,1);
            draw();
        });
    }
    draw();
    $('resetOrder').onclick=()=>{state.buildWords=[...q.words];state.buildAnswer=[];draw();};
    $('checkOrder').onclick=()=>{
        if(state.answered)return;
        let built=state.buildAnswer.join(' ');
        let ok=norm(built)===norm(q.answer);
        state.answered=true;
        state.total++;
        if(ok){state.correct++;state.score+=10;state.streak++;}else{state.streak=0;}
        feedback(ok,`Correct sentence: <b>${q.answer}</b><br>Your sentence: <b>${built||'(empty)'}</b><br>${q.explain}`);
    };
}

            <tr><td>Normal sentence</td><td>Subject + verb + rest</td><td>Ich lerne Deutsch.</td></tr>
            <tr><td>W question</td><td>Question word + verb + subject</td><td>Wann kommst du?</td></tr>
            <tr><td>Yes or no question</td><td>Verb + subject + rest</td><td>Kommst du heute?</td></tr>
            <tr><td>Modal verb</td><td>Modal verb in position 2, main verb at the end</td><td>Ich muss Deutsch lernen.</td></tr>
            <tr><td>Separable verb</td><td>Prefix goes to the end</td><td>Ich rufe meine Mutter an.</td></tr>
        </table>
    </div>

    <div class="theoryBlock">
        <h2>10. W questions</h2>
        <table class="caseTable">
            <tr><th>German</th><th>English</th><th>Use</th><th>Example</th></tr>
            <tr><td>wer</td><td>who</td><td>person as subject</td><td>Wer kommt heute?</td></tr>
            <tr><td>was</td><td>what</td><td>thing or action</td><td>Was machst du?</td></tr>
            <tr><td>wann</td><td>when</td><td>time</td><td>Wann kommst du?</td></tr>
            <tr><td>wo</td><td>where</td><td>location</td><td>Wo wohnst du?</td></tr>
            <tr><td>wohin</td><td>where to</td><td>direction</td><td>Wohin gehst du?</td></tr>
            <tr><td>woher</td><td>where from</td><td>origin</td><td>Woher kommst du?</td></tr>
            <tr><td>wie</td><td>how</td><td>name, condition, manner</td><td>Wie heißt du?</td></tr>
            <tr><td>warum</td><td>why</td><td>reason</td><td>Warum lernst du Deutsch?</td></tr>
            <tr><td>wie viel</td><td>how much</td><td>price or uncountable amount</td><td>Wie viel kostet das Brot?</td></tr>
            <tr><td>wie viele</td><td>how many</td><td>countable plural nouns</td><td>Wie viele Kinder hast du?</td></tr>
        </table>
    </div>

    <div class="theoryBlock">
        <h2>11. Adjective endings, A1 starter</h2>
        <p>Full adjective declension has many more forms (Dativ, Genitiv, strong vs. weak endings). This is the safe, high-frequency A1 subset: Nominativ and Akkusativ after ein-words and der-words.</p>
        <div class="declSection">After ein / kein / mein... (ein-word)</div>
        <table class="caseTable genderTable">
            <tr><th>Case</th><th>Masculine</th><th>Feminine</th><th>Neuter</th><th>Plural (kein/meine...)</th></tr>
            <tr><td>Nominativ</td><td>ein kleiner Hund</td><td>eine kleine Tasche</td><td>ein kleines Kind</td><td>keine kleinen Kinder</td></tr>
            <tr><td>Akkusativ</td><td class="changed">einen kleinen Hund</td><td>eine kleine Tasche</td><td>ein kleines Kind</td><td>keine kleinen Kinder</td></tr>
        </table>
        <div class="declSection">After der / die / das / dieser...(der-word)</div>
        <table class="caseTable genderTable">
            <tr><th>Case</th><th>Masculine</th><th>Feminine</th><th>Neuter</th><th>Plural</th></tr>
            <tr><td>Nominativ</td><td>der kleine Hund</td><td>die kleine Tasche</td><td>das kleine Kind</td><td>die kleinen Kinder</td></tr>
            <tr><td>Akkusativ</td><td class="changed">den kleinen Hund</td><td>die kleine Tasche</td><td>das kleine Kind</td><td>die kleinen Kinder</td></tr>
        </table>
        <div class="callout">Important: this is not the full adjective declension table. For A1, master these common speaking/writing patterns first — that covers the vast majority of what shows up on the exam.</div>
    </div>

    <div class="theoryBlock">
        <h2>12. A1 sentence patterns</h2>
        <table class="caseTable">
            <tr><th>Pattern</th><th>Meaning</th><th>Example</th></tr>
            <tr><td>haben + Akkusativ</td><td>to have something</td><td>Ich habe einen Bruder.</td></tr>
            <tr><td>sein + adjective</td><td>to be something / feel something</td><td>Ich bin müde.</td></tr>
            <tr><td>möchten + noun</td><td>would like something</td><td>Ich möchte einen Kaffee.</td></tr>
            <tr><td>modal + infinitive</td><td>can, must, want, should + verb</td><td>Ich kann gut kochen.</td></tr>
            <tr><td>es gibt + Akkusativ</td><td>there is / there are</td><td>Es gibt einen Supermarkt.</td></tr>
        </table>
    </div>

    <div class="callout"><b>Recommended order:</b> cases and articles first, then prepositions and two-way prepositions, Dativ verbs, pronouns, possessives, der-words, negation, word order, W questions, adjective endings, and finally sentence patterns.</div>
    </div>`;
}
function render(){
    document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===state.mode));
    if(state.mode==='caseArticle') return caseArticleQ();
    if(state.mode==='caseIdentify') return caseIdentifyQ();
    if(state.mode==='preposition') return prepositionQ();
    if(state.mode==='twoWay') return twoWayQ();
    if(state.mode==='pronoun') return pronounQ();
    if(state.mode==='possessive') return possessiveQ();
    if(state.mode==='negation') return fillChoiceQ('negation','Negation');
    if(state.mode==='wordOrder') return wordOrderQ();
    if(state.mode==='questionWords') return questionWordQ();
    if(state.mode==='adjectiveEnding') return fillChoiceQ('adjectiveEndings','Adjective Endings');
    if(state.mode==='patterns') return fillChoiceQ('patterns','Sentence Patterns');
    if(state.mode==='rules') return rulesView();
}
document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;render();});
render();
</script>
