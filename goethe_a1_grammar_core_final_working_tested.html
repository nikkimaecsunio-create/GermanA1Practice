<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<title>Goethe A1 Grammar Core Trainer</title>
<style>
:root{
--bg:#f8f1e8;--card:#fffaf4;--ink:#21170f;--muted:#806f61;--line:#dfcbb6;--accent:#b85f42;--good:#167445;--bad:#af3737;--soft:#f0dfcb;
--der:#2E5C8A;--der-soft:#dde8f3;--die:#A23E5C;--die-soft:#f6e1e8;--das:#3E7A52;--das-soft:#e1ecdf;--plural:#7B5EA7;--plural-soft:#ece4f3
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--ink)}
header,.app{max-width:1180px;margin:auto;padding:22px 24px}
.eyebrow{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;text-transform:uppercase;letter-spacing:.16em;color:#9b3f24;font-weight:900;font-size:13px;margin-bottom:8px}
h1{font-size:clamp(30px,4vw,48px);margin:0 0 8px;line-height:1.05}
.sub{color:var(--muted);line-height:1.45;font-size:16px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.nav{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:18px 0}
.btn{border:0;border-radius:10px;padding:15px 12px;font-weight:900;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#fffdf9;border:1px solid var(--line);color:#111;min-height:56px}
.btn:hover{background:#fff6eb;border-color:#cda98b}
.btn.active,.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.round{min-height:auto;border-radius:999px;padding:10px 15px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:0 12px 28px rgba(73,43,20,.06);margin-bottom:16px}
.grid{display:grid;grid-template-columns:1.12fr .88fr;gap:16px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
.kicker{text-transform:uppercase;letter-spacing:.1em;font-size:12px;color:#9b3f24;font-weight:900;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.big{font-size:clamp(32px,5.5vw,64px);font-weight:950;margin:12px 0 4px;line-height:1.05}
.meaning{font-size:18px;color:var(--muted);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.prompt{font-size:24px;font-weight:850;margin:14px 0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.options{display:grid;gap:10px}
.option{width:100%;padding:15px 16px;border-radius:14px;border:1px solid var(--line);background:white;text-align:left;font-size:18px;font-weight:850;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.option:hover{border-color:var(--accent);background:#fff9f2}
.option.correct{background:#e9f7ef;border-color:var(--good);color:var(--good)}
.option.wrong{background:#fdecec;border-color:var(--bad);color:var(--bad)}
.option.gM{border-left:6px solid var(--der)}
.option.gF{border-left:6px solid var(--die)}
.option.gN{border-left:6px solid var(--das)}
.option.gPl{border-left:6px solid var(--plural)}
.feedback{display:none;margin-top:15px;background:white;border:1px solid var(--line);border-radius:16px;padding:14px;line-height:1.55;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.feedback.good{display:block;background:#eefaf3;border-color:#b9e6cc}
.feedback.bad{display:block;background:#fff0f0;border-color:#f0bcbc}
.feedback.neutral{display:block;background:#f6f0ff;border-color:#d2c2ee}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.controls .btn{min-height:auto;padding:12px 16px;border-radius:999px}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.stat b{display:block;font-size:28px}
.rule{background:#fff;border:1px solid var(--line);border-radius:16px;padding:13px;line-height:1.5;margin-top:10px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.small{font-size:13px;color:var(--muted);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.input{width:100%;min-height:95px;padding:14px;border:1px solid var(--line);border-radius:14px;font-size:18px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:white;resize:vertical}
.wordchip,.badge{display:inline-block;background:white;border:1px solid var(--line);border-radius:999px;padding:10px 14px;margin:4px;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-weight:850}
.badge{background:var(--soft);cursor:default}
.answerBox{min-height:54px;background:#fff;border:1px dashed var(--accent);border-radius:16px;padding:10px;margin:12px 0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.caseTable,.sideMini{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden;border-radius:16px;border:1px solid var(--line);background:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;margin:12px 0}
.caseTable th,.caseTable td,.sideMini th,.sideMini td{padding:11px 9px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);text-align:center;white-space:normal}
.caseTable th,.sideMini th{background:#f0dfcb;color:#3b2416;font-weight:900}
.caseTable td:first-child,.caseTable th:first-child,.sideMini td:first-child,.sideMini th:first-child{text-align:left;font-weight:900}
.caseTable tr:last-child td,.sideMini tr:last-child td{border-bottom:0}
.caseTable th:last-child,.caseTable td:last-child,.sideMini th:last-child,.sideMini td:last-child{border-right:0}
.genderTable th:nth-child(2),.genderTable td:nth-child(2):not(.changed):not(.hot){color:var(--der)}
.genderTable th:nth-child(3),.genderTable td:nth-child(3):not(.changed):not(.hot){color:var(--die)}
.genderTable th:nth-child(4),.genderTable td:nth-child(4):not(.changed):not(.hot){color:var(--das)}
.genderTable th:nth-child(5),.genderTable td:nth-child(5):not(.changed):not(.hot){color:var(--plural)}
.changed,.hot{background:#fff1e8;color:#9b3f24!important;font-weight:900}
.theoryBlock{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;margin:14px 0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;line-height:1.55}
.theoryBlock h2{margin:0 0 8px;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-size:26px}
.callout{background:#fff1e8;border:1px solid #e2b092;border-radius:14px;padding:12px;margin-top:10px}
.genderKey{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0 4px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-size:13px;font-weight:850}
.genderKey span{display:inline-flex;align-items:center;gap:6px}
.genderKey i{width:11px;height:11px;border-radius:3px;display:inline-block}
.bar{height:12px;background:#fff;border:1px solid var(--line);border-radius:999px;overflow:hidden;margin-top:8px}
.fill{height:100%;background:var(--accent)}
.voicePanel{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;margin:12px 0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.voiceGrid{display:grid;grid-template-columns:1fr 120px;gap:8px;align-items:center}
.select{width:100%;padding:12px;border:1px solid var(--line);border-radius:14px;background:white;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-size:16px}
.speakBtn{display:inline-block;border:1px solid var(--line);background:#fffdf9;color:#111;border-radius:999px;padding:9px 13px;margin:4px 4px 4px 0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-weight:900;cursor:pointer}
.timer{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-size:42px;font-weight:900;color:var(--accent)}
.modeSelect{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin:0 0 12px}

h1{
    font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif!important;
    font-weight:900;
    letter-spacing:-.04em;
}
.big{
    font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif!important;
    letter-spacing:-.045em;
}
.card,.btn,.option,.sub,.meaning,.prompt,.small,.rule,.caseTable,.sideMini,.theoryBlock,.feedback,.input,.wordchip,.badge{
    font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif!important;
}
.theoryBlock{
    background:#fffdf9;
    box-shadow:0 8px 22px rgba(73,43,20,.045);
}
.teacherNote{
    background:#f4f7ff;
    border:1px solid #c5d3ee;
    border-left:5px solid var(--der);
    border-radius:14px;
    padding:13px 15px;
    margin:12px 0;
    line-height:1.55;
}
.warningNote{
    background:#fff1e8;
    border:1px solid #e2b092;
    border-left:5px solid var(--accent);
    border-radius:14px;
    padding:13px 15px;
    margin:12px 0;
    line-height:1.55;
}
.successNote{
    background:#eefaf3;
    border:1px solid #b9e6cc;
    border-left:5px solid var(--good);
    border-radius:14px;
    padding:13px 15px;
    margin:12px 0;
    line-height:1.55;
}
.flowGrid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:12px;
    margin:12px 0;
}
.flowCard{
    background:#fff;
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px;
    line-height:1.5;
}
.flowCard b{
    color:#9b3f24;
}
.checkList{
    margin:8px 0 0;
    padding-left:18px;
}
.checkList li{
    margin:6px 0;
}


.tutorBox{
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    padding:13px 14px;
    margin:11px 0;
}
.tutorTitle{
    font-weight:900;
    color:#9b3f24;
    margin-bottom:7px;
}
.tutorSteps{
    display:grid;
    gap:8px;
    margin-top:9px;
}
.tutorStep{
    background:#fffaf4;
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 11px;
}
.tutorStep b{
    color:#21170f;
}
.compareBox{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:10px;
}
.compareWrong,.compareRight{
    border-radius:12px;
    padding:10px 11px;
    border:1px solid var(--line);
}
.compareWrong{
    background:#fff0f0;
    border-color:#f0bcbc;
}
.compareRight{
    background:#eefaf3;
    border-color:#b9e6cc;
}
@media(max-width:700px){.compareBox{grid-template-columns:1fr}}


.audioRow{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 4px}
.audioBtn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fffdf9;color:#111;border-radius:999px;padding:10px 14px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-weight:900;cursor:pointer}
.audioBtn:hover{background:#fff6eb;border-color:var(--accent)}
.preAnswerNote{background:#fff8ef;border:1px dashed var(--accent);border-radius:14px;padding:11px 13px;margin:10px 0;color:#4a3826;line-height:1.45;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.audioAnswerBox{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px 12px;margin-top:10px}
.hiddenHintPanel{display:none;margin-top:10px;background:#fff8ef;border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:14px;padding:12px 14px;line-height:1.5}
.hiddenHintPanel.open{display:block}
button:disabled{opacity:.85;cursor:not-allowed}

</style>
</head>
<body>
<header>
<div class="eyebrow">GOETHE A1 · PRONOUNS & DETERMINERS</div>
<h1>A1 Grammar Core Trainer</h1>
<div class="sub">Prepositions, demonstratives, personal pronouns, possessive articles, kein, wer/wen/wem/wessen, and der/die/das color coded by gender.</div>
<div class="voicePanel">
<div class="kicker">Voice Settings</div>
<div class="voiceGrid">
<select id="voiceSelect" class="select"><option>Loading voices...</option></select>
<label class="small">Rate<br><input id="voiceRate" type="range" min="0.6" max="1.1" step="0.05" value="0.82"></label>
</div>
</div>
</header>
<main class="app">
<div class="nav">
<button class="btn active" data-mode="theory">Theory</button>
<button class="btn" data-mode="preposition">Prepositions</button>
<button class="btn" data-mode="prep_am">AM IM UM</button>

<button class="btn" data-mode="prep_build">Prep Sentences</button>
<button class="btn" data-mode="demonstrative">Dieser Diese Dieses</button>
<button class="btn" data-mode="personal">Personal Pronouns</button>
<button class="btn" data-mode="possessive">Possessives</button>
<button class="btn" data-mode="kein">Kein Forms</button>
<button class="btn" data-mode="question_case">Wer Wen Wem</button>
<button class="btn" data-mode="type">Type</button>
<button class="btn" data-mode="build">Build Sentence</button>
<button class="btn" data-mode="exam">Exam</button>
<button class="btn" data-mode="mistakes">Mistakes</button>
</div>
<div id="content"></div>
</main>

function shell(main,q=null){$('content').innerHTML=`<div class="grid"><div class="card">${main}</div>${side(q)}</div>`}
function feedback(kind,html){let f=$('feedback');f.className='feedback '+kind;f.innerHTML=html;f.style.display='block'}
function score(ok){state.total++;if(ok){state.correct++;state.score+=10;state.streak++}else state.streak=0}
function checkSession(){if(state.session>=SESSION_SIZE){shell(`<div class="kicker">Session Complete</div><div class="big">You finished 30 questions.</div><div class="meaning">Start again for another unused set.</div><div class="controls"><button class="btn primary" onclick="state.session=0;render()">Start Next 30</button><button class="btn" onclick="resetDeck()">Reset Deck</button></div>`);return true}return false}

function choiceQ(q){
let fallback=['am','im','um','zum','zur','beim','bei','nach','zu','aus','von','mit','für','durch','auf dem','auf den','in der','in die'];
let choices=shuffle([...new Set([q.answer,...(q.choices||[]).filter(Boolean),...fallback])]).slice(0,6);

document.querySelectorAll('[data-choice-index]').forEach(btn=>{btn.onclick=()=>checkChoiceIndex(Number(btn.dataset.choiceIndex),btn);});}

function inferExplanation(q,userAnswer){
    const ans=q.answer||''; const user=userAnswer||''; const why=q.why||''; const prompt=q.prompt||'';
    const steps=[];
    function add(t,x){steps.push(`<div class="tutorStep"><b>${t}</b><br>${x}</div>`)}
    if(q.group && (q.group.includes('prep') || q.group==='preposition')){
        if(ans.includes('für')){add('1. Preposition meaning','<b>für</b> means for.');add('2. Case rule','<b>für</b> always uses Akkusativ.'); if(ans.includes('meinen Vater')) add('3. Ending','Vater is masculine, so mein Vater becomes <b>meinen Vater</b> in Akkusativ.');}
        else if(ans.includes('am ')){add('1. am rule','<b>am = an + dem</b>. Use it for days, parts of day, weekend, and places like am Bahnhof.');add('2. Compare','Exact time uses <b>um</b>. Months/seasons often use <b>im</b>.');}
        else if(ans.includes('um ')){add('1. um rule','Use <b>um</b> for exact clock time, like um acht Uhr.');}
        else if(ans.includes('im ')){add('1. im rule','<b>im = in + dem</b>. Use it for months, seasons, rooms, and inside places.');}
        else if(ans.includes('zum ')||ans.includes('zur ')||ans.startsWith('zu ')){add('1. zu rule','Use <b>zu</b> for going to a person, doctor, school, office, or service.');add('2. Short forms','zum = zu + dem. zur = zu + der.');}
        else if(ans.includes('beim ')||ans.startsWith('bei ')){add('1. bei rule','Use <b>bei</b> for being at someone, at the doctor, workplace, or company.');add('2. Compare','zum Arzt = going to the doctor. beim Arzt = being at the doctor.');}
        else if(ans.includes('nach ')){add('1. nach rule','Use <b>nach</b> for cities, countries without article, and home: nach Berlin, nach Hause.');}
        else add('Preposition rule', why || 'Prepositions often force Akkusativ or Dativ.');
    } else if(q.group==='demonstrative'){
        add('1. Word family','dieser, diese, dieses mean this or these. They follow der/die/das endings.');
        if(ans.includes('diesen')) add('2. Why diesen?','Masculine Akkusativ changes dieser to <b>diesen</b>.');
        else if(ans.includes('diesem')) add('2. Why diesem?','Masculine or neuter Dativ uses <b>diesem</b>.');
        else if(ans.includes('dieser')) add('2. Why dieser?','This can be masculine Nominativ or feminine Dativ. Check noun gender and case.');
        else if(ans.includes('diese')) add('2. Why diese?','Feminine or plural often uses <b>diese</b> in Nominativ and Akkusativ.');
        else if(ans.includes('dieses')) add('2. Why dieses?','Neuter Nominativ or Akkusativ uses <b>dieses</b>.');
    } else if(q.group==='possessive'){
        add('1. Owner','Choose the owner first: ich=mein, du=dein, er/es=sein, sie=ihr, wir=unser, Sie=Ihr.');
        add('2. Ending','The noun gender and case decide the ending. Masculine Akkusativ usually ends in <b>-en</b>. Dativ often uses <b>-em</b> or <b>-er</b>.');
    } else if(q.group==='kein'){
        add('1. Meaning','kein means no or not a, and is used before nouns.');
        add('2. Pattern','kein changes like ein: kein Hund, keine Tasche, kein Buch, keinen Hund.');
    } else if(q.group==='personal'){
        if(prompt.includes('sehe')||why.includes('Akkusativ')){add('1. Verb rule','sehen uses Akkusativ.');add('2. Pronoun case','Use mich, dich, ihn, sie, es, uns, euch, sie, Sie.');}
        else {add('1. Verb rule','helfen uses Dativ.');add('2. Pronoun case','Use mir, dir, ihm, ihr, ihm, uns, euch, ihnen, Ihnen.');}
    } else if(q.group==='question_case'){
        add('Question word logic','Wer = subject. Wen = Akkusativ person. Wem = Dativ person. Wessen = whose.');
    } else {
        add('Correct answer logic', why || 'Check the case, gender, and sentence pattern.');
    }
    const wrong = norm(user)!==norm(ans) ? 'Your answer does not match the required German form. Usually this means the preposition, case ending, or pronoun case is wrong or incomplete.' : 'Your answer matches the required form.';
    return `<div class="tutorBox"><div class="tutorTitle">Mini tutor explanation</div><div class="compareBox"><div class="compareWrong"><b>Your answer</b><br>${user||'(empty)'}<br><span class="small">${wrong}</span></div><div class="compareRight"><b>Correct answer</b><br>${ans}<br><span class="small">${why}</span></div></div><div class="tutorSteps">${steps.join('')}</div></div>`;
}

function checkChoiceIndex(index,btn){
if(state.answered)return;
state.answered=true;
let c=(state.currentChoices||[])[index]||'';
let ok=norm(c)===norm(state.current.answer);
score(ok);
if(!ok)addMistake(state.current,c);
document.querySelectorAll('[data-choice-index]').forEach(b=>{const val=(state.currentChoices||[])[Number(b.dataset.choiceIndex)]||'';b.disabled=true;if(norm(val)===norm(state.current.answer))b.classList.add('correct');});
if(btn&&!ok)btn.classList.add('wrong');
let tutor=inferExplanation(state.current,c);
feedback(ok?'good':'bad',`${ok?'Correct.':'Not quite.'}<br>${tutor}${answerAudio()}`);}
function checkChoice(c){let idx=(state.currentChoices||[]).indexOf(c);checkChoiceIndex(idx,null);}
function typeQ(q){
shell(`<div class="kicker">${q.group}</div><div class="big">${q.prompt}</div>${preAnswerAudio(q)}<div class="prompt">Type the German answer.</div><textarea id="typed" class="input" placeholder="Type here..."></textarea><div id="feedback" class="feedback"></div><div class="controls"><button class="btn primary" onclick="checkType()">Check</button><button class="btn" onclick="showAnswer()">Show answer</button><button class="btn" onclick="ask()">Next</button></div>`,q);
$('typed').focus();}
function checkType(){let val=$('typed').value;let ok=norm(val)===norm(state.current.answer);score(ok);if(!ok)addMistake(state.current,val);let tutor=inferExplanation(state.current,val);feedback(ok?'good':'bad',`${ok?'Correct.':'Check this.'}<br>${tutor}${answerAudio()}`);}

function buildQ(q){
state.buildWords=shuffle(q.answer.replace(/[.!?]/g,'').split(/\s+/));state.buildAnswer=[];
shell(`<div class="kicker">${q.group}</div><div class="big">${q.prompt}</div><div class="meaning">${q.en||''}</div>${preAnswerAudio(q)}<div class="prompt">Build the German sentence.</div><div id="answerBox" class="answerBox"></div><div id="chips"></div><div id="feedback" class="feedback"></div><div class="controls"><button class="btn primary" onclick="checkBuild()">Check</button><button class="btn" onclick="resetBuild()">Reset</button><button class="btn" onclick="ask()">Next</button></div>`,q);
drawBuild();}
function drawBuild(){$('answerBox').innerHTML=state.buildAnswer.map(w=>`<span class="badge">${w}</span>`).join(' ');$('chips').innerHTML=state.buildWords.map((w,i)=>`<span class="wordchip" data-i="${i}">${w}</span>`).join('');document.querySelectorAll('.wordchip').forEach(ch=>ch.onclick=()=>{let i=Number(ch.dataset.i);state.buildAnswer.push(state.buildWords[i]);state.buildWords.splice(i,1);drawBuild()})}
function resetBuild(){state.buildWords=shuffle(state.current.answer.replace(/[.!?]/g,'').split(/\s+/));state.buildAnswer=[];drawBuild()}
function checkBuild(){let built=state.buildAnswer.join(' ');let ok=norm(built)===norm(state.current.answer);score(ok);if(!ok)addMistake(state.current,built);let tutor=inferExplanation(state.current,built);feedback(ok?'good':'bad',`${ok?'Correct.':'Check the order.'}<br>${tutor}${answerAudio()}`);}
function exam(){
if(checkSession())return;state.current=nextQ();state.session++;state.timeLeft=30;let q=state.current;
shell(`<div class="kicker">Exam Mode</div><div class="timer" id="timer">30</div><div class="big">${q.prompt}</div>${preAnswerAudio(q)}<div class="prompt">Answer before time runs out. No hints first.</div><textarea id="typed" class="input" placeholder="Type answer..."></textarea><div id="feedback" class="feedback"></div><div class="controls"><button class="btn primary" onclick="examCheck()">Submit</button><button class="btn" onclick="exam()">Next</button></div>`,q);
$('typed').focus();clearInterval(state.timer);state.timer=setInterval(()=>{state.timeLeft--;$('timer').textContent=state.timeLeft;if(state.timeLeft<=0){clearInterval(state.timer);examCheck(true)}},1000);}
function examCheck(timeout=false){clearInterval(state.timer);let val=$('typed')?$('typed').value:'';let ok=!timeout&&norm(val)===norm(state.current.answer);score(ok);if(!ok)addMistake(state.current,val||'timeout');let tutor=inferExplanation(state.current,val||'timeout');feedback(ok?'good':'bad',`${timeout?'Time is up.':ok?'Correct.':'Needs review.'}<br>${tutor}${answerAudio()}`);}
function theory(){
let html=`<div class="card">

<div class="teacherNote">
<b>For Filipino learners:</b> German is difficult because English, Filipino, Cebuano, and Tagalog do not work like German articles. In German, the small word before the noun changes depending on <b>gender</b> and <b>case</b>. This is why you see der, den, dem, die, der, das, dem. Do not memorize only the English meaning. Memorize the full chunk: <b>der Mann</b>, <b>den Mann</b>, <b>dem Mann</b>.
</div>

<div class="genderKey">
<span><i style="background:var(--der)"></i>Masculine der</span>
<span><i style="background:var(--die)"></i>Feminine die</span>
<span><i style="background:var(--das)"></i>Neuter das</span>
<span><i style="background:var(--plural)"></i>Plural die</span>
</div>

<div class="theoryBlock">
<h2>1. The decision flow: how to choose the form</h2>
<p>When you see a blank, do not guess. Ask these questions in order.</p>
<div class="flowGrid">
<div class="flowCard"><b>Step 1: What is the noun?</b><br>der Mann, die Frau, das Kind, die Kinder. First know the gender or plural.</div>
<div class="flowCard"><b>Step 2: What is the role?</b><br>Subject = Nominativ. Direct object = Akkusativ. After dative verb or dative preposition = Dativ.</div>
<div class="flowCard"><b>Step 3: What word family?</b><br>der word: dieser. ein word: mein, dein, kein. Personal pronoun: ich → mich / mir.</div>
<div class="flowCard"><b>Step 4: Apply the ending.</b><br>Masculine changes often: der → den → dem, dieser → diesen → diesem, mein → meinen → meinem.</div>
</div>
<div class="successNote"><b>Most important A1 shortcut:</b> Masculine is the danger gender. In Akkusativ, masculine changes to <b>den / einen / diesen / meinen / keinen</b>. Feminine and neuter stay the same in Akkusativ.</div>

<div class="theoryBlock">
<h2>2. Prepositions</h2>
<p>Prepositions tell time, place, direction, and relationship. They are not optional in German. Many German phrases cannot be translated word by word from English.</p>

<h3>2.1 The most confusing one: am</h3>
<div class="warningNote">
<b>am = an + dem</b>. It can mean on, in, or at depending on the phrase. This is why it feels confusing.
</div>
<table class="caseTable">
<tr><th>Use</th><th>German</th><th>English</th><th>Why</th></tr>
<tr><td>Day</td><td>am Montag</td><td>on Monday</td><td>Days use am</td></tr>
<tr><td>Part of day</td><td>am Morgen, am Abend</td><td>in the morning, in the evening</td><td>Parts of day usually use am</td></tr>
<tr><td>Weekend</td><td>am Wochenende</td><td>on the weekend</td><td>Fixed phrase</td></tr>
<tr><td>Place</td><td>am Bahnhof, am Tisch</td><td>at the station, at the table</td><td>At or beside a location</td></tr>
<tr><td>Superlative</td><td>am besten</td><td>best</td><td>Fixed grammar pattern</td></tr>
</table>
<div class="warningNote">
<b>Do not use am for exact time.</b> Say <b>um acht Uhr</b>, not am acht Uhr.<br>
<b>Do not use am for months.</b> Say <b>im Januar</b>, not am Januar.<br>
<b>Exception:</b> in der Nacht, not am Nacht.
</div>

<h3>2.2 am vs im vs um</h3>
<table class="caseTable">
<tr><th>German</th><th>Use</th><th>Example</th></tr>
<tr><td><b>am</b></td><td>days, parts of day, weekend, at some places</td><td>am Montag, am Morgen, am Bahnhof</td></tr>
<tr><td><b>im</b></td><td>months, seasons, rooms, inside places</td><td>im Januar, im Sommer, im Büro</td></tr>
<tr><td><b>um</b></td><td>exact time</td><td>um acht Uhr, um halb neun</td></tr>
</table>

<h3>2.3 zu vs nach vs bei</h3>
<table class="caseTable">
<tr><th>German</th><th>Use</th><th>Example</th></tr>
<tr><td><b>zu</b></td><td>going to a person, doctor, school, event, service</td><td>zum Arzt, zur Schule, zu meiner Mutter</td></tr>
<tr><td><b>nach</b></td><td>going to a city, country without article, or home</td><td>nach Berlin, nach Deutschland, nach Hause</td></tr>
<tr><td><b>bei</b></td><td>being at a person, doctor, workplace, company</td><td>beim Arzt, bei meiner Mutter, bei Amazon</td></tr>
</table>
<div class="teacherNote">
<b>Movement vs location:</b><br>
Ich gehe <b>zum Arzt</b>. = I go to the doctor.<br>

<h3>2.4 in / auf two way logic</h3>
<table class="caseTable">

<h3>2.5 Fixed case prepositions</h3>
${tableHtml(TABLES.fixed_case_preps)}
${tableHtml(TABLES.preposition_core)}
${tableHtml(TABLES.two_way)}

<div class="theoryBlock">

function mistakeView(){let m=mistakes();if(!m.length){$('content').innerHTML=`<div class="card"><div class="kicker">Mistakes</div><div class="big">No mistakes yet.</div></div>`;return}$('content').innerHTML=`<div class="card"><div class="kicker">Mistakes</div><div class="big">${m.length} saved mistakes</div><div class="controls"><button class="btn" onclick="clearMistakes()">Clear mistakes</button></div><table class="caseTable"><tr><th>Question</th><th>Your answer</th><th>Correct</th><th>Why</th></tr>${m.map(x=>`<tr><td>${x.prompt}</td><td>${x.user||''}</td><td><b>${x.answer}</b></td><td>${x.why}</td></tr>`).join('')}</table></div>`}
function clearMistakes(){safeStore.removeItem('pron_det_mistakes_v1');render()}
function escapeJS(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ')}
function render(){clearInterval(state.timer);setActive();if(state.mode==='theory')theory();else if(state.mode==='mistakes')mistakeView();else if(state.mode==='exam')exam();else ask()}
document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;state.session=0;render()});
render();
</script>
</body>
