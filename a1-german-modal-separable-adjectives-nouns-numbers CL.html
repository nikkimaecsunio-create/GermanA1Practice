<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A1 German · Grammar &amp; Vocab Trainer</title>
<style>
  :root{
    --bg:#F6F0E7;
    --bg-soft:#FBF7F1;
    --card:#FFFFFF;
    --ink:#3B362F;
    --ink-soft:#8A7D6E;
    --border:#E4D9C8;
    --accent:#BD5B3D;
    --accent-dark:#9C4A31;
    --accent-soft:#F1DCD0;
    --good:#5C7A52;
    --good-soft:#E1EAD9;
    --bad:#B0473C;
    --bad-soft:#F4DCD7;
    --der:#3D6FA8;
    --der-soft:#DCE7F3;
    --die:#B0473C;
    --die-soft:#F4DCD7;
    --das:#5C7A52;
    --das-soft:#E1EAD9;
    --radius:14px;
    --radius-sm:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    padding-bottom:60px;
  }
  h1,h2,h3{
    font-family:Georgia,"Iowan Old Style","Times New Roman",serif;
    font-weight:600;
    margin:0 0 .4em 0;
    color:var(--ink);
  }
  .wrap{max-width:800px;margin:0 auto;padding:0 16px;}
  header{
    background:var(--bg-soft);
    border-bottom:1px solid var(--border);
    padding:20px 0 14px;
    position:sticky;
    top:0;
    z-index:20;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--accent-dark);
    font-weight:700;
    margin-bottom:4px;
  }
  header h1{font-size:22px;margin-bottom:2px;}
  header p.sub{margin:0 0 14px;color:var(--ink-soft);font-size:13.5px;}

  nav#topicButtons{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:7px;
    margin-bottom:10px;
  }
  nav#topicButtons button{
    appearance:none;
    border:1.5px solid var(--border);
    background:var(--card);
    color:var(--ink);
    font-size:12.5px;
    font-weight:700;
    padding:10px 4px;
    border-radius:var(--radius-sm);
    cursor:pointer;
    min-height:46px;
    transition:background .15s,border-color .15s,color .15s,transform .1s;
  }
  nav#topicButtons button:hover{border-color:var(--accent);}
  nav#topicButtons button:active{transform:scale(.97);}
  nav#topicButtons button.active{
    background:var(--ink);
    border-color:var(--ink);
    color:#fff;
  }

  nav#navButtons{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
    gap:7px;
  }
  nav#navButtons button{
    appearance:none;
    border:1px solid var(--border);
    background:var(--card);
    color:var(--ink);
    font-size:13px;
    font-weight:600;
    padding:11px 8px;
    border-radius:var(--radius-sm);
    cursor:pointer;
    min-height:44px;
    transition:background .15s,border-color .15s,color .15s,transform .1s;
  }
  nav#navButtons button:hover{border-color:var(--accent);}
  nav#navButtons button:active{transform:scale(.97);}
  nav#navButtons button.active{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  #statsBar{
    max-width:800px;
    margin:14px auto 0;
    padding:0 16px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
  }
  .stat-pill{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:999px;
    padding:7px 14px;
    font-size:13px;
    font-weight:600;
    color:var(--ink);
    display:flex;
    gap:6px;
    align-items:center;
  }
  .stat-pill span.label{color:var(--ink-soft);font-weight:500;}
  .reset-link{
    margin-left:auto;
    font-size:12.5px;
    color:var(--ink-soft);
    background:none;
    border:none;
    text-decoration:underline;
    cursor:pointer;
    padding:6px;
  }
  main{max-width:800px;margin:18px auto 0;padding:0 16px;}
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:24px;
    margin-bottom:16px;
  }
  .tag{
    display:inline-block;
    font-size:11.5px;
    font-weight:700;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--accent-dark);
    background:var(--accent-soft);
    padding:4px 10px;
    border-radius:999px;
    margin-bottom:14px;
  }
  .prompt-word{
    font-family:Georgia,serif;
    font-size:32px;
    font-weight:700;
    color:var(--ink);
    margin:4px 0 6px;
  }
  .prompt-sub{color:var(--ink-soft);font-size:14.5px;margin-bottom:18px;}
  .meta-row{
    display:flex;
    flex-direction:column;
    gap:4px;
    margin-bottom:18px;
    font-size:15px;
  }
  .meta-row .k{color:var(--ink-soft);font-size:12.5px;text-transform:uppercase;letter-spacing:.05em;}
  .meta-row .v{font-weight:700;font-size:18px;}
  .choices{display:flex;flex-direction:column;gap:10px;}
  .choices.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .choice-btn{
    appearance:none;
    text-align:left;
    width:100%;
    background:var(--bg-soft);
    border:1.5px solid var(--border);
    border-radius:var(--radius-sm);
    padding:16px 18px;
    font-size:16px;
    font-weight:600;
    color:var(--ink);
    cursor:pointer;
    min-height:54px;
    transition:background .15s,border-color .15s,transform .1s;
  }
  .choices.grid3 .choice-btn{text-align:center;padding:16px 8px;}
  .choice-btn:hover:not(:disabled){border-color:var(--accent);}
  .choice-btn:active:not(:disabled){transform:scale(.99);}
  .choice-btn:disabled{cursor:default;}
  .choice-btn.correct{background:var(--good-soft);border-color:var(--good);color:var(--good);}
  .choice-btn.wrong{background:var(--bad-soft);border-color:var(--bad);color:var(--bad);}
  .choice-btn.dim{opacity:.55;}
  .type-row{display:flex;gap:10px;flex-wrap:wrap;}
  .type-row input[type=text]{
    flex:1 1 220px;
    font-size:17px;
    padding:14px 16px;
    border-radius:var(--radius-sm);
    border:1.5px solid var(--border);
    background:var(--bg-soft);
    color:var(--ink);
    min-height:54px;
  }
  .type-row input[type=text]:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .btn{
    appearance:none;
    border:none;
    background:var(--accent);
    color:#fff;
    font-weight:700;
    font-size:15.5px;
    padding:14px 22px;
    border-radius:var(--radius-sm);
    cursor:pointer;
    min-height:54px;
    transition:background .15s,transform .1s;
  }
  .btn:hover{background:var(--accent-dark);}
  .btn:active{transform:scale(.98);}
  .btn.secondary{
    background:var(--bg-soft);
    color:var(--ink);
    border:1.5px solid var(--border);
  }
  .btn.secondary:hover{border-color:var(--accent);background:var(--bg-soft);}
  .feedback{
    margin-top:18px;
    border-radius:var(--radius-sm);
    padding:16px 18px;
    border:1.5px solid var(--border);
    position:relative;
    overflow:hidden;
  }
  .feedback.good{background:var(--good-soft);border-color:var(--good);}
  .feedback.bad{background:var(--bad-soft);border-color:var(--bad);}
  .feedback .verdict{
    font-weight:800;
    font-size:16px;
    margin-bottom:6px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .feedback.good .verdict{color:var(--good);}
  .feedback.bad .verdict{color:var(--bad);}
  .feedback .answer-line{font-size:15px;margin-bottom:6px;}
  .feedback .explain{font-size:14px;color:var(--ink);opacity:.9;}
  .feedback .example{font-size:13.5px;color:var(--ink-soft);margin-top:8px;font-style:italic;}
  .next-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:14px;
    gap:10px;
  }
  .next-row .timerbar-wrap{
    flex:1;
    height:5px;
    background:var(--border);
    border-radius:99px;
    overflow:hidden;
  }
  .next-row .timerbar{
    height:100%;
    width:100%;
    background:var(--accent);
    border-radius:99px;
  }
  .next-row .timerbar.run{
    transition:width 4s linear;
    width:0%;
  }
  .next-btn{
    flex:none;
    background:none;
    border:1.5px solid var(--border);
    color:var(--ink);
    font-weight:700;
    font-size:13.5px;
    padding:9px 14px;
    border-radius:999px;
    cursor:pointer;
    white-space:nowrap;
  }
  .next-btn:hover{border-color:var(--accent);color:var(--accent-dark);}
  .empty-state{text-align:center;padding:30px 10px;color:var(--ink-soft);}
  .empty-state .big{font-size:38px;margin-bottom:8px;}
  table.datatable{
    width:100%;
    border-collapse:collapse;
    font-size:13.5px;
  }
  table.datatable th,table.datatable td{
    text-align:left;
    padding:9px 10px;
    border-bottom:1px solid var(--border);
    white-space:nowrap;
  }
  table.datatable th{
    color:var(--ink-soft);
    font-size:11.5px;
    text-transform:uppercase;
    letter-spacing:.04em;
    font-weight:700;
    position:sticky;
    top:0;
    background:var(--card);
  }
  table.datatable tr:hover td{background:var(--bg-soft);}
  .table-scroll{overflow-x:auto;overflow-y:auto;max-height:560px;border:1px solid var(--border);border-radius:var(--radius-sm);}
  .search-row{margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;}
  .search-row input{
    flex:1 1 200px;
    font-size:15px;
    padding:13px 16px;
    border-radius:var(--radius-sm);
    border:1.5px solid var(--border);
    background:var(--bg-soft);
    color:var(--ink);
  }
  .search-row select{
    font-size:14px;
    padding:13px 10px;
    border-radius:var(--radius-sm);
    border:1.5px solid var(--border);
    background:var(--bg-soft);
    color:var(--ink);
  }
  .rule-section{margin-bottom:22px;}
  .rule-section h3{font-size:17px;margin-bottom:8px;}
  .rule-section h4{font-size:14.5px;margin:14px 0 6px;color:var(--accent-dark);}
  .rule-section p{margin:0 0 10px;font-size:14.5px;}
  .example-box{
    background:var(--bg-soft);
    border:1px solid var(--border);
    border-left:4px solid var(--accent);
    border-radius:var(--radius-sm);
    padding:12px 16px;
    font-size:14px;
    margin-bottom:10px;
  }
  .example-box .infw{font-weight:800;color:var(--accent-dark);}
  .example-box ul{margin:6px 0 0;padding-left:18px;}
  .example-box li{margin-bottom:2px;}
  .pill-row{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 0;}
  .pill{
    background:var(--accent-soft);
    color:var(--accent-dark);
    border-radius:999px;
    padding:3px 10px;
    font-size:12.5px;
    font-weight:700;
  }
  .art-der{color:var(--der);font-weight:800;}
  .art-die{color:var(--die);font-weight:800;}
  .art-das{color:var(--das);font-weight:800;}
  .gender-btn[data-g="der"].correct{background:var(--der-soft);border-color:var(--der);color:var(--der);}
  .gender-btn[data-g="die"].correct{background:var(--die-soft);border-color:var(--die);color:var(--die);}
  .gender-btn[data-g="das"].correct{background:var(--das-soft);border-color:var(--das);color:var(--das);}
  .rule-table{width:100%;border-collapse:collapse;font-size:13.5px;margin-bottom:10px;}
  .rule-table th,.rule-table td{text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);}
  .rule-table th{color:var(--ink-soft);font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;}
  footer.note{
    text-align:center;
    color:var(--ink-soft);
    font-size:12px;
    margin-top:30px;
    padding:0 16px;
  }
  @media (max-width:600px){
    nav#topicButtons{grid-template-columns:repeat(3,1fr);}
  }
  @media (max-width:480px){
    .prompt-word{font-size:26px;}
    .card{padding:16px;}
    nav#navButtons{grid-template-columns:repeat(2,1fr);}
    .choices.grid3{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="eyebrow">Goethe A1 · Start Deutsch 1</div>
    <h1>German A1 Grammar &amp; Vocab Trainer</h1>
    <p class="sub" id="topicSub">Modal verbs · separable verbs · adjectives · nouns · numbers</p>
    <nav id="topicButtons">
      <button data-topic="modal">Modal verbs</button>
      <button data-topic="separable">Separable verbs</button>
      <button data-topic="adjectives">Adjectives</button>
      <button data-topic="nouns">Nouns</button>
      <button data-topic="numbers">Numbers</button>
    </nav>
    <nav id="navButtons"></nav>
  </div>
</header>

<div id="statsBar">
  <div class="stat-pill"><span class="label">Score</span> <span id="statScore">0/0</span></div>
  <div class="stat-pill"><span class="label">Streak</span> <span id="statStreak">0</span></div>
  <div class="stat-pill"><span class="label">Accuracy</span> <span id="statAccuracy">—</span></div>
  <button class="reset-link" id="resetStatsBtn">reset this topic</button>
</div>

<main id="appMain"></main>

<footer class="note">Content adapted from learngermanwithgames.com — Goethe A1 (Start Deutsch 1). Works fully offline.</footer>

/* ============================ SHARED HELPERS ============================ */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function normalizeTyped(str){
  return String(str).trim().toLowerCase().replace(/\s+/g,' ');
}
function normalizeDeAscii(str){
  return normalizeTyped(str)
    .replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss');
}
function meaningVariants(meaning){
  return meaning.split(',').map(s=>s.trim().replace(/^to\s+/i,'').toLowerCase()).filter(Boolean);
}
function firstMeaning(meaning){
  return meaningVariants(meaning)[0] || meaning;
}
function pick(arr, excludeFn){
  let pool = arr;
  if(excludeFn){
    const filtered = arr.filter(x=>!excludeFn(x));
    if(filtered.length) pool = filtered;
  }
  return pool[Math.floor(Math.random()*pool.length)];
}

/* ============================ STATE ============================ */
function mistakesLSKey(topic){ return `a1deCombined_${topic}_mistakes_v1`; }
function statsLSKey(topic){ return `a1deCombined_${topic}_stats_v1`; }

function loadMistakesFor(topic){
  try{ const v = JSON.parse(localStorage.getItem(mistakesLSKey(topic))); return Array.isArray(v)?v:[]; }catch(e){ return []; }
}
function loadStatsFor(topic){
  try{
    const v = JSON.parse(localStorage.getItem(statsLSKey(topic)));
    if(v && typeof v.total==='number') return v;
  }catch(e){}
  return {total:0, correct:0, streak:0, best:0};
}

const TOPIC_IDS = ['modal','separable','adjectives','nouns','numbers'];
const state = {
  topic: 'modal',
  mode: null,
  mistakes: {}, // topic -> array
  stats: {},    // topic -> {total,correct,streak,best}
  lastKey: {},  // topic -> last-shown item key (avoid immediate repeats)
  timer: null
};
TOPIC_IDS.forEach(t=>{
  state.mistakes[t] = loadMistakesFor(t);
  state.stats[t] = loadStatsFor(t);
  state.lastKey[t] = null;
});

function saveMistakes(topic){
  try{ localStorage.setItem(mistakesLSKey(topic), JSON.stringify(state.mistakes[topic])); }catch(e){}
}
function saveStats(topic){
  try{ localStorage.setItem(statsLSKey(topic), JSON.stringify(state.stats[topic])); }catch(e){}
}
function addMistake(topic, entry, keyFn){
  const list = state.mistakes[topic];
  const k = keyFn(entry);
  if(!list.some(m=>keyFn(m)===k)){
    list.push(entry);
    saveMistakes(topic);
  }
}
function removeMistake(topic, entry, keyFn){
  const list = state.mistakes[topic];
  const k = keyFn(entry);
  const next = list.filter(m=>keyFn(m)!==k);
  if(next.length!==list.length){
    state.mistakes[topic] = next;
    saveMistakes(topic);
  }
}
function registerAnswer(topic, isCorrect){
  const s = state.stats[topic];
  s.total++;
  if(isCorrect){
    s.correct++;
    s.streak++;
    if(s.streak>s.best) s.best = s.streak;
  } else {
    s.streak = 0;
  }
  saveStats(topic);
  renderStats();
}
function renderStats(){
  const s = state.stats[state.topic];
  document.getElementById('statScore').textContent = `${s.correct}/${s.total}`;
  document.getElementById('statStreak').textContent = s.streak;
  document.getElementById('statAccuracy').textContent = s.total
    ? Math.round(s.correct/s.total*100)+'%'
    : '—';
}

}
function scheduleAdvance(renderFn){
  clearAdvanceTimer();
  const bar = document.getElementById('advanceBar');
  if(bar){
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{ bar.classList.add('run'); });

  const nextBtn = document.getElementById('nextNowBtn');

      clearAdvanceTimer();
      renderFn();
    };
  }
}

/* ============================ VERB MODULE (shared by Modal + Separable) ============================ */
const PRONOUNS = ['ich','du','er','wir','ihr','sie'];
const PRONOUN_LABEL = {ich:'ich', du:'du', er:'er/sie/es', wir:'wir', ihr:'ihr', sie:'sie/Sie'};
const SPECIAL_CORES = ['sein','haben','werden','wissen','mögen','tun'];

function regularStem(core){
  if(core==='tun') return 'tu';
  if(core.endsWith('en')) return core.slice(0,-2);
  if(core.endsWith('n')) return core.slice(0,-1);
  return core;
}
function duEndingFor(stem){
  if(/(tz|[sxzß])$/.test(stem)) return 't';
  if(/[dt]$/.test(stem)) return 'est';
  return 'st';
}
function erEndingFor(stem){
  if(/[dt]$/.test(stem)) return 'et';
  return 't';
}
function regularFormsFor(core){
  const stem = regularStem(core);
  return {
    ich: stem+'e',
    du: stem+duEndingFor(stem),
    er: stem+erEndingFor(stem),
    wir: core,
    ihr: stem+erEndingFor(stem),
    sie: core
  };
}
function actualCoreForm(verb, pronoun){
  const full = verb.forms[pronoun];
  if(verb.particle){
    return full.slice(0, full.length - verb.particle.length - 1);
  }
  return full;
}
function explainStemChange(verb, pronoun){
  if(SPECIAL_CORES.includes(verb.core)){
    return `"${verb.core}" is one of a small set of highly irregular German verbs. Its forms don't follow a stem pattern — they're memorized as a set.`;
  }
  const reg = regularFormsFor(verb.core);
  const actual = actualCoreForm(verb, pronoun);
  if(reg[pronoun] === actual){
    return `"${verb.core}" follows the regular ending pattern in the present tense here — no stem change for this pronoun.`;
  }
  return `"${verb.core}" is a stem-changing verb. The regular pattern would give "${reg[pronoun]}", but the stem vowel changes in the du and er/sie/es forms, giving "${actual}" instead.`;
}

const MODAL_EXPLANATIONS = {
  'sollen': 'Modal verbs drop the usual personal endings in ich and er/sie/es — both are just the bare stem "soll", with no -e and no -t. sollen has no vowel change between singular and plural.',
  'wollen': 'Modal verbs drop the usual personal endings in ich and er/sie/es — both are the bare stem "will". Note the vowel change: woll- (infinitive/plural) becomes will- in the singular (ich/du/er).',
  'dürfen': 'Modal verbs drop the usual personal endings in ich and er/sie/es — both are the bare stem "darf". The umlaut drops in the singular: dürf- (infinitive/plural) becomes darf- (ich/du/er).',
  'müssen': 'Modal verbs drop the usual personal endings in ich and er/sie/es — both are the bare stem "muss". The umlaut drops in the singular: müss- (infinitive/plural) becomes muss- (ich/du/er).',
  'möchten': 'möchten is actually a subjunctive form of mögen, used at A1 to mean "would like to". Like other modal verbs, ich and er/sie/es share the identical form "möchte" — but unlike the others, the stem stays the same throughout (no vowel change between singular and plural).',
  'können': 'Modal verbs drop the usual personal endings in ich and er/sie/es — both are the bare stem "kann". The umlaut drops in the singular: könn- (infinitive/plural) becomes kann- (ich/du/er).'
};
function explainModal(verb){
  return MODAL_EXPLANATIONS[verb.inf] || `${verb.inf} is a modal verb: ich and er/sie/es always share the same bare-stem form.`;
}

function makeVerbModule(topicKey, verbs, explainFn, modesLabel, rulesHtml, listHeading, subText){
  function pickVerb(){
    const v = pick(verbs, x=>x.inf===state.lastKey[topicKey]);
    state.lastKey[topicKey] = v.inf;
    return v;
  }
  function verbByInf(inf){ return verbs.find(v=>v.inf===inf); }
  function fullForm(verb,p){ return verb.forms[p]; }
  function mistakeKey(entry){ return entry.type==='meaning' ? `m:${entry.inf}` : `c:${entry.inf}:${entry.pronoun}`; }

  function renderMeaningChoices(mistakeEntry){
    const verb = mistakeEntry ? verbByInf(mistakeEntry.inf) : pickVerb();
    const distractPool = shuffle(verbs.filter(v=>v.inf!==verb.inf).map(v=>v.meaning));
    const distractors = [];
    for(const m of distractPool){
      if(!distractors.includes(m) && m!==verb.meaning){ distractors.push(m); }
      if(distractors.length===3) break;
    }
    const options = shuffle([verb.meaning, ...distractors]);
    const main = document.getElementById('appMain');
    main.innerHTML = `
      <div class="card">
        <span class="tag">${mistakeEntry?'Mistakes · ':''}Meaning choices</span>
        <div class="prompt-word">${escapeHtml(verb.inf)}</div>
        <div class="prompt-sub">What does this verb mean?</div>
        <div class="choices" id="choiceArea">
          ${options.map(m=>`<button class="choice-btn" data-val="${escapeHtml(m)}">${escapeHtml(m)}</button>`).join('')}
        </div>
        <div id="feedbackArea"></div>
      </div>
    `;
    document.querySelectorAll('#choiceArea .choice-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const chosen = btn.dataset.val;
        const isCorrect = chosen===verb.meaning;
        document.querySelectorAll('#choiceArea .choice-btn').forEach(b=>{
          b.disabled = true;
          if(b.dataset.val===verb.meaning) b.classList.add('correct');
          else if(b===btn) b.classList.add('wrong');
          else b.classList.add('dim');
        });
        registerAnswer(topicKey, isCorrect);
        const entry = {type:'meaning', inf:verb.inf};
        if(isCorrect) removeMistake(topicKey, entry, mistakeKey); else addMistake(topicKey, entry, mistakeKey);
        showFeedback({
          isCorrect,
          answerLineHtml:`Correct meaning: <strong>${escapeHtml(verb.meaning)}</strong>`,
          exampleDe:verb.sentenceDe, exampleEn:verb.sentenceEn,
          onNext: ()=> state.mode==='mistakes' ? renderMistakesGate() : renderMeaningChoices()
        });
      });
    });
  }

  function renderTypedMeaning(mistakeEntry){
    const verb = mistakeEntry ? verbByInf(mistakeEntry.inf) : pickVerb();
    const main = document.getElementById('appMain');
    main.innerHTML = `
      <div class="card">
        <span class="tag">${mistakeEntry?'Mistakes · ':''}Typed meaning</span>
        <div class="prompt-word">${escapeHtml(verb.inf)}</div>
        <div class="prompt-sub">Type the English meaning ("to" is optional).</div>
        <div class="type-row">
          <input type="text" id="typedInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="e.g. work / to work">
          <button class="btn" id="submitBtn">Check</button>
        </div>
        <div id="feedbackArea"></div>
      </div>
    `;
    const input = document.getElementById('typedInput');
    input.focus();
    const submit = ()=>{
      const raw = input.value;
      if(!raw.trim()) return;
      const userVal = normalizeTyped(raw).replace(/^to\s+/i,'');
      const variants = meaningVariants(verb.meaning);
      const isCorrect = variants.includes(userVal);
      input.disabled = true;
      document.getElementById('submitBtn').disabled = true;
      registerAnswer(topicKey, isCorrect);
      const entry = {type:'meaning', inf:verb.inf};
      if(isCorrect) removeMistake(topicKey, entry, mistakeKey); else addMistake(topicKey, entry, mistakeKey);
      showFeedback({
        isCorrect,
        answerLineHtml:`Correct meaning: <strong>${escapeHtml(verb.meaning)}</strong>`,
        exampleDe:verb.sentenceDe, exampleEn:verb.sentenceEn,
        onNext: ()=> state.mode==='mistakes' ? renderMistakesGate() : renderTypedMeaning()
      });
    };
    document.getElementById('submitBtn').addEventListener('click', submit);
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
  }

  function renderConjChoices(mistakeEntry){
    const verb = mistakeEntry ? verbByInf(mistakeEntry.inf) : pickVerb();
    const pronoun = mistakeEntry ? mistakeEntry.pronoun : PRONOUNS[Math.floor(Math.random()*PRONOUNS.length)];
    const correct = fullForm(verb, pronoun);
    let pool = new Set();
    PRONOUNS.forEach(p=>{
      if(p!==pronoun){
        const f = fullForm(verb,p);
        if(f!==correct) pool.add(f);
      }
    });
    let distractors = shuffle(Array.from(pool)).slice(0,3);
    if(distractors.length<3){
      const others = shuffle(verbs.filter(v=>v.inf!==verb.inf));
      for(const v of others){
        const f = fullForm(v, pronoun);
        if(f!==correct && !distractors.includes(f)) distractors.push(f);
        if(distractors.length>=3) break;
      }
    }
    const options = shuffle([correct, ...distractors]);
    const main = document.getElementById('appMain');
    main.innerHTML = `
      <div class="card">
        <span class="tag">${mistakeEntry?'Mistakes · ':''}Conjugation choices</span>
        <div class="meta-row">
          <div><span class="k">Infinitive</span><br><span class="v">${escapeHtml(verb.inf)}</span></div>
          <div><span class="k">Pronoun</span><br><span class="v">${escapeHtml(PRONOUN_LABEL[pronoun])}</span></div>
          <div><span class="k">Meaning</span><br><span class="v">to ${escapeHtml(firstMeaning(verb.meaning))}</span></div>
        </div>
        <div class="prompt-sub">What is the correct conjugation?</div>
        <div class="choices" id="choiceArea">
          ${options.map(o=>`<button class="choice-btn" data-val="${escapeHtml(o)}">${escapeHtml(PRONOUN_LABEL[pronoun])} ${escapeHtml(o)}</button>`).join('')}
        </div>
        <div id="feedbackArea"></div>
      </div>
    `;
    document.querySelectorAll('#choiceArea .choice-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const chosen = btn.dataset.val;
        const isCorrect = chosen===correct;
        document.querySelectorAll('#choiceArea .choice-btn').forEach(b=>{
          b.disabled = true;
          if(b.dataset.val===correct) b.classList.add('correct');
          else if(b===btn) b.classList.add('wrong');
          else b.classList.add('dim');
        });
        registerAnswer(topicKey, isCorrect);
        const entry = {type:'conj', inf:verb.inf, pronoun};
        if(isCorrect) removeMistake(topicKey, entry, mistakeKey); else addMistake(topicKey, entry, mistakeKey);
        showFeedback({
          isCorrect,
          answerLineHtml:`Correct: <strong>${escapeHtml(PRONOUN_LABEL[pronoun])} ${escapeHtml(correct)}</strong>`,
          explainText: explainFn(verb, pronoun),
          exampleDe:verb.sentenceDe, exampleEn:verb.sentenceEn,
          onNext: ()=> state.mode==='mistakes' ? renderMistakesGate() : renderConjChoices()
        });
      });
    });
  }

  function renderTypedConj(mistakeEntry){
    const verb = mistakeEntry ? verbByInf(mistakeEntry.inf) : pickVerb();
    const pronoun = mistakeEntry ? mistakeEntry.pronoun : PRONOUNS[Math.floor(Math.random()*PRONOUNS.length)];
    const correct = fullForm(verb, pronoun);
    const main = document.getElementById('appMain');
    main.innerHTML = `
      <div class="card">
        <span class="tag">${mistakeEntry?'Mistakes · ':''}Typed conjugation</span>
        <div class="meta-row">
          <div><span class="k">Infinitive</span><br><span class="v">${escapeHtml(verb.inf)}</span></div>
          <div><span class="k">Pronoun</span><br><span class="v">${escapeHtml(PRONOUN_LABEL[pronoun])}</span></div>
          <div><span class="k">Meaning</span><br><span class="v">to ${escapeHtml(firstMeaning(verb.meaning))}</span></div>
        </div>
        <div class="prompt-sub">Type the correct conjugated verb (include a separable part if needed). Don't include the pronoun.</div>
        <div class="type-row">
          <input type="text" id="typedInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="e.g. machst auf">
          <button class="btn" id="submitBtn">Check</button>
        </div>
        <div id="feedbackArea"></div>
      </div>
    `;
    const input = document.getElementById('typedInput');
    input.focus();
    const submit = ()=>{
      const raw = input.value;
      if(!raw.trim()) return;
      const userNorm = normalizeTyped(raw);
      const userAscii = normalizeDeAscii(raw);
      const correctNorm = normalizeTyped(correct);
      const correctAscii = normalizeDeAscii(correct);
      const isCorrect = userNorm===correctNorm || userAscii===correctAscii;
      input.disabled = true;
      document.getElementById('submitBtn').disabled = true;
      registerAnswer(topicKey, isCorrect);
      const entry = {type:'conj', inf:verb.inf, pronoun};
      if(isCorrect) removeMistake(topicKey, entry, mistakeKey); else addMistake(topicKey, entry, mistakeKey);
      showFeedback({
        isCorrect,
        answerLineHtml:`Correct phrase: <strong>${escapeHtml(PRONOUN_LABEL[pronoun])} ${escapeHtml(correct)}</strong>`,
        explainText: explainFn(verb, pronoun),
        exampleDe:verb.sentenceDe, exampleEn:verb.sentenceEn,
        onNext: ()=> state.mode==='mistakes' ? renderMistakesGate() : renderTypedConj()
      });
    };
    document.getElementById('submitBtn').addEventListener('click', submit);
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
  }

  function renderMistakesGate(){
    const list = state.mistakes[topicKey];
    if(list.length===0){
      const main = document.getElementById('appMain');
      main.innerHTML = `
        <div class="card">
          <span class="tag">Mistakes only</span>
          <div class="empty-state">
            <div class="big">&#10003;</div>
            <h3>No mistakes saved yet</h3>
            <p>Answer some questions in the other modes — anything you get wrong will show up here so you can drill it.</p>
          </div>
        </div>
      `;
      return;
    }
    const entry = list[Math.floor(Math.random()*list.length)];
    if(entry.type==='meaning') renderMeaningChoices(entry); else renderConjChoices(entry);
    const tag = document.querySelector('#appMain .tag');
    if(tag) tag.textContent = `Mistakes only (${list.length} saved)`;
  }

  function renderVerbList(){
    const main = document.getElementById('appMain');
    main.innerHTML = `
      <div class="card">
        <span class="tag">Verb list</span>
        <h2 style="margin-top:0;">${escapeHtml(listHeading)}</h2>
        <div class="search-row">
          <input type="text" id="searchInput" placeholder="Search by German verb or English meaning…">
        </div>
        <div class="table-scroll">
          <table class="datatable">
            <thead><tr>
              <th>Infinitive</th><th>Meaning</th><th>ich</th><th>du</th><th>er/sie/es</th><th>wir</th><th>ihr</th><th>sie/Sie</th>
            </tr></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    `;
    const body = document.getElementById('tableBody');
    function draw(filter){
      const f = filter.trim().toLowerCase();
      const rows = verbs.filter(v=> !f || v.inf.toLowerCase().includes(f) || v.meaning.toLowerCase().includes(f));
      body.innerHTML = rows.map(v=>`
        <tr>
          <td><strong>${escapeHtml(v.inf)}</strong></td>
          <td>${escapeHtml(v.meaning)}</td>
          <td>${escapeHtml(v.forms.ich)}</td>
          <td>${escapeHtml(v.forms.du)}</td>
          <td>${escapeHtml(v.forms.er)}</td>
          <td>${escapeHtml(v.forms.wir)}</td>
          <td>${escapeHtml(v.forms.ihr)}</td>
          <td>${escapeHtml(v.forms.sie)}</td>
        </tr>
      `).join('') || `<tr><td colspan="8" style="color:var(--ink-soft);">No verbs match your search.</td></tr>`;
    }
    draw('');
    document.getElementById('searchInput').addEventListener('input', e=>draw(e.target.value));
  }

  function renderRules(){
    const main = document.getElementById('appMain');
    main.innerHTML = `<div class="card"><span class="tag">Rules</span>${rulesHtml}</div>`;
  }

  function render(mode){
    switch(mode){
      case 'meaningChoices': renderMeaningChoices(); break;
      case 'typedMeaning': renderTypedMeaning(); break;
      case 'conjChoices': renderConjChoices(); break;
      case 'typedConj': renderTypedConj(); break;
      case 'mistakes': renderMistakesGate(); break;
      case 'verbList': renderVerbList(); break;
      case 'rules': renderRules(); break;
    }
  }

  return {
    sub: subText,
    defaultMode: 'meaningChoices',
    modes: [
      {key:'meaningChoices', label:'Meaning choices'},
      {key:'typedMeaning', label:'Typed meaning'},
      {key:'conjChoices', label:'Conjugation choices'},
      {key:'typedConj', label:'Typed conjugation'},
      {key:'mistakes', label:'Mistakes only'},
      {key:'verbList', label:modesLabel},
      {key:'rules', label:'Rules'}
    ],
    render
  };
}

const MODAL_RULES_HTML = `

<div class="rule-section">

  </table>

<div class="rule-section">

  <div class="example-box">
    ich kann / er kann &nbsp;·&nbsp; ich muss / er muss &nbsp;·&nbsp; ich darf / er darf<br>

  </div>
  <p>du, ihr and wir/sie/Sie still use mostly-normal endings (-st, -t, and the infinitive-like plural form).</p>
</div>

<div class="rule-section">
  <h3>3. Umlaut drops in the singular</h3>
  <p>können, müssen and dürfen have an umlaut (ö/ü) in the infinitive and in wir/ihr/sie — but that umlaut disappears in ich/du/er. wollen changes its vowel too (o → i). sollen and möchten don't change vowel at all.</p>
  <table class="rule-table">
    <thead><tr><th>Infinitive (plural stem)</th><th>Singular stem (ich/du/er)</th></tr></thead>
    <tbody>
      <tr><td>k<strong>ö</strong>nnen</td><td>k<strong>a</strong>nn</td></tr>
      <tr><td>m<strong>ü</strong>ssen</td><td>m<strong>u</strong>ss</td></tr>
      <tr><td>d<strong>ü</strong>rfen</td><td>d<strong>a</strong>rf</td></tr>
      <tr><td>w<strong>o</strong>llen</td><td>w<strong>i</strong>ll</td></tr>
      <tr><td>sollen <em>(no change)</em></td><td>soll</td></tr>
      <tr><td>möchten <em>(no change)</em></td><td>möchte</td></tr>
    </tbody>
  </table>
</div>

<div class="rule-section">
  <h3>4. Sentence structure: modal verb in position 2, infinitive at the end</h3>
  <p>A modal verb takes the normal "verb second" position. The main action verb stays in its plain infinitive form and is pushed all the way to the end of the clause — this is one of the most important patterns in German.</p>
  <div class="example-box">
    Ich <strong>kann</strong> gut Deutsch <strong>sprechen</strong>.<br>
    Ich <strong>muss</strong> jetzt nach Hause <strong>gehen</strong>.<br>
    <strong>Möchtest</strong> du einen Kaffee <strong>trinken</strong>?
  </div>
  <p>This is also true in questions and with separable verbs — the separable prefix just stays attached to the infinitive at the very end: <em>Ich möchte das Fenster aufmachen.</em></p>
</div>

<div class="rule-section">
  <h3>5. möchten vs. mögen</h3>
  <p>möchten ("would like to") is technically a polite/subjunctive form built from mögen ("to like"). At A1 you'll mostly use möchten + infinitive to politely ask for or offer something, while mögen + noun is used to say you like a thing directly (<em>Ich mag Pizza</em>).</p>
</div>
`;

/* ============================ SEPARABLE VERB RULES ============================ */
const SEPARABLE_RULES_HTML = `
<h2 style="margin-top:0;">How German separable (trennbare) verbs work</h2>

<div class="rule-section">
  <h3>1. What "separable" means</h3>
  <p>A separable verb is built from a small prefix (a particle, like <em>auf, an, zu, mit, ein, aus, zurück, vor</em>) plus a base verb. In the infinitive they're written as one word — <em>aufmachen, anrufen, einsteigen</em> — but in a normal present-tense sentence, the prefix splits off and jumps to the very end of the clause.</p>
  <div class="example-box">
    aufmachen → Ich <strong>mache</strong> die Tür <strong>auf</strong>.<br>
    anrufen → Ich <strong>rufe</strong> dich heute <strong>an</strong>.<br>
    einsteigen → Wir <strong>steigen</strong> hier <strong>ein</strong>.
  </div>
</div>

<div class="rule-section">
  <h3>2. Conjugate the base verb normally</h3>
  <p>The base verb (machen, rufen, steigen, etc.) takes its completely normal personal endings — and if the base verb is itself irregular/stem-changing (like geben, nehmen, fahren, halten, waschen, schlafen), that irregularity still applies in du and er/sie/es.</p>
  <div class="example-box">
    zurückgeben (base: geben, e→i) → du gibst zurück, er gibt zurück<br>
    teilnehmen (base: nehmen, e→i) → du nimmst teil, er nimmt teil<br>
    anhalten (base: halten, a→ä) → du hältst an, er hält an<br>
    abwaschen (base: waschen, a→ä) → du wäschst ab, er wäscht ab<br>
    einschlafen (base: schlafen, a→ä) → du schläfst ein, er schläft ein
  </div>
</div>

<div class="rule-section">
  <h3>3. Common separable prefixes at A1</h3>
  <div class="pill-row">
    <span class="pill">auf-</span><span class="pill">an-</span><span class="pill">zu-</span><span class="pill">aus-</span>
    <span class="pill">ein-</span><span class="pill">mit-</span><span class="pill">ab-</span><span class="pill">zurück-</span>
    <span class="pill">vor-</span><span class="pill">weg-</span>
  </div>
  <p>Most of these are also stand-alone words with a directional or adverbial meaning (auf = up/open, zu = closed/to, mit = with, zurück = back), which is a useful hint for guessing what a separable verb means.</p>
</div>

<div class="rule-section">
  <h3>4. Where the prefix goes with modal verbs and in subordinate clauses</h3>
  <p>If there's already a modal verb or another verb in position 2, the separable verb doesn't split at all — it stays together as one infinitive at the end of the clause (see the Modal Verbs rules for more on this pattern).</p>
  <div class="example-box">
    Ich muss die Tür <strong>aufmachen</strong>. <em>(not "mache...auf")</em>
  </div>
</div>
`;

          else if(b===btn) b.classList.add('wrong');
          else b.classList.add('dim');
        });
        registerAnswer(topicKey, isCorrect);
        const entry = {type:'meaning', word:noun.word};
        if(isCorrect) removeMistake(topicKey, entry, mistakeKey); else addMistake(topicKey, entry, mistakeKey);
        showFeedback({
          isCorrect,
          answerLineHtml:`Correct meaning: <strong>${escapeHtml(noun.meaning)}</strong>`,
          exampleDe:noun.sentenceDe, exampleEn:noun.sentenceEn,
          onNext: ()=> state.mode==='mistakes' ? renderMistakesGate() : renderMeaningChoices()
        });
      });
    });
  }

  function renderTypedMeaning(mistakeEntry){
    const noun = mistakeEntry ? nounByWord(mistakeEntry.word) : pickNoun();
    const main = document.getElementById('appMain');
    main.innerHTML = `
      <div class="card">
        <span class="tag">${mistakeEntry?'Mistakes · ':''}Typed meaning</span>
        <div class="prompt-word">${escapeHtml(noun.word)}</div>
        <div class="prompt-sub">Type the English meaning.</div>
        <div class="type-row">
          <input type="text" id="typedInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="e.g. part">
          <button class="btn" id="submitBtn">Check</button>
        </div>
        <div id="feedbackArea"></div>
      </div>
    `;
    const input = document.getElementById('typedInput');
    input.focus();
    const submit = ()=>{
      const raw = input.value;
      if(!raw.trim()) return;
      const userVal = normalizeTyped(raw);
      const variants = meaningVariants(noun.meaning);
      const isCorrect = variants.includes(userVal);
      input.disabled = true;
      document.getElementById('submitBtn').disabled = true;
      registerAnswer(topicKey, isCorrect);
      const entry = {type:'meaning', word:noun.word};
      if(isCorrect) removeMistake(topicKey, entry, mistakeKey); else addMistake(topicKey, entry, mistakeKey);
      showFeedback({
        isCorrect,
        answerLineHtml:`Correct meaning: <strong>${escapeHtml(noun.meaning)}</strong>`,
        exampleDe:noun.sentenceDe, exampleEn:noun.sentenceEn,
        onNext: ()=> state.mode==='mistakes' ? renderMistakesGate() : renderTypedMeaning()
      });
    };
    document.getElementById('submitBtn').addEventListener('click', submit);
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
  }

  function renderPluralChoices(mistakeEntry){
    const noun = mistakeEntry ? nounByWord(mistakeEntry.word) : pickNoun(PLURALABLE);
    const correct = noun.plural;
    const distractPool = shuffle(PLURALABLE.filter(n=>n.word!==noun.word).map(n=>n.plural));
    const distractors = [];
    for(const p of distractPool){
      if(!distractors.includes(p) && p!==correct){ distractors.push(p); }
      if(distractors.length===3) break;
    }
    const options = shuffle([correct, ...distractors]);
    const main = document.getElementById('appMain');
    main.innerHTML = `
      <div class="card">
        <span class="tag">${mistakeEntry?'Mistakes · ':''}Plural recognition</span>
        <div class="prompt-word">${escapeHtml(noun.word)}</div>
        <div class="prompt-sub">What is the plural form?</div>
        <div class="choices" id="choiceArea">
          ${options.map(m=>`<button class="choice-btn" data-val="${escapeHtml(m)}">${escapeHtml(m)}</button>`).join('')}
        </div>
        <div id="feedbackArea"></div>
      </div>
    `;
    document.querySelectorAll('#choiceArea .choice-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const isCorrect = btn.dataset.val===correct;
        document.querySelectorAll('#choiceArea .choice-btn').forEach(b=>{
          b.disabled = true;
          if(b.dataset.val===correct) b.classList.add('correct');
          else if(b===btn) b.classList.add('wrong');
          else b.classList.add('dim');
        });
        registerAnswer(topicKey, isCorrect);
        const entry = {type:'plural', word:noun.word};
        if(isCorrect) removeMistake(topicKey, entry, mistakeKey); else addMistake(topicKey, entry, mistakeKey);
        showFeedback({
          isCorrect,
          answerLineHtml:`Correct plural: <strong>${escapeHtml(correct)}</strong>`,
          exampleDe:noun.sentenceDe, exampleEn:noun.sentenceEn,
          onNext: ()=> state.mode==='mistakes' ? renderMistakesGate() : renderPluralChoices()
        });
      });
    });
  }

  function renderMistakesGate(){
    const list = state.mistakes[topicKey];
    if(list.length===0){
      const main = document.getElementById('appMain');
      main.innerHTML = `
        <div class="card">
          <span class="tag">Mistakes only</span>
          <div class="empty-state">
            <div class="big">&#10003;</div>
            <h3>No mistakes saved yet</h3>
            <p>Answer some questions in the other modes — anything you get wrong will show up here so you can drill it.</p>
          </div>
        </div>
      `;
      return;
    }
    const entry = list[Math.floor(Math.random()*list.length)];
    if(entry.type==='gender') renderGenderChoices(entry);
    else if(entry.type==='meaning') renderMeaningChoices(entry);
    else renderPluralChoices(entry);
    const tag = document.querySelector('#appMain .tag');
    if(tag) tag.textContent = `Mistakes only (${list.length} saved)`;
  }

  function renderNounList(){
    const main = document.getElementById('appMain');
    main.innerHTML = `
      <div class="card">
        <span class="tag">Noun list</span>
        <h2 style="margin-top:0;">Nouns cheat sheet (320 words)</h2>
        <div class="search-row">
          <input type="text" id="searchInput" placeholder="Search by German word or English meaning…">
          <select id="articleFilter">
            <option value="">All genders</option>
            <option value="der">der</option>
            <option value="die">die</option>
            <option value="das">das</option>
          </select>
        </div>
        <div class="table-scroll">
          <table class="datatable">
            <thead><tr><th>Word</th><th>Plural</th><th>Meaning</th></tr></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    `;
    const body = document.getElementById('tableBody');
    function draw(filter, articleF){
      const f = filter.trim().toLowerCase();
      const rows = NOUNS.filter(n=>{
        if(articleF && n.article!==articleF) return false;
        return !f || n.word.toLowerCase().includes(f) || n.meaning.toLowerCase().includes(f);
      });
      body.innerHTML = rows.map(n=>`
        <tr>
          <td><span class="${ARTICLE_COLOR[n.article]||''}">${escapeHtml(n.word)}</span></td>
          <td>${escapeHtml(n.plural==='-'? '— (no plural)' : n.plural)}</td>
          <td>${escapeHtml(n.meaning)}</td>
        </tr>
      `).join('') || `<tr><td colspan="3" style="color:var(--ink-soft);">No nouns match your search.</td></tr>`;
    }
    draw('','');
    const search = document.getElementById('searchInput');
    const artSel = document.getElementById('articleFilter');
    search.addEventListener('input', ()=>draw(search.value, artSel.value));
    artSel.addEventListener('change', ()=>draw(search.value, artSel.value));
  }

  const RULES_HTML = `
    <h2 style="margin-top:0;">How German noun gender &amp; plurals work</h2>
    <div class="rule-section">
      <h3>1. Every noun has a gender — learn it with the word</h3>
      <p>German has three genders: <span class="art-der">der</span> (masculine), <span class="art-die">die</span> (feminine), <span class="art-das">das</span> (neuter). Gender mostly can't be guessed from meaning, so the golden rule is: always learn a noun together with its article, not on its own.</p>
    </div>
    <div class="rule-section">
      <h3>2. Endings that hint at gender</h3>
      <table class="rule-table">
        <thead><tr><th>Pattern</th><th>Usual gender</th><th>Examples</th></tr></thead>
        <tbody>
          <tr><td>-e</td><td class="art-die">die (feminine)</td><td>die Tasche, die Lampe</td></tr>
          <tr><td>-heit, -keit, -ung, -schaft, -tät, -ion</td><td class="art-die">die (feminine)</td><td>die Freiheit, die Zeitung</td></tr>
          <tr><td>-chen, -lein</td><td class="art-das">das (neuter, diminutives)</td><td>das Mädchen</td></tr>
          <tr><td>-or, -ling, -ich, -ig</td><td class="art-der">der (masculine)</td><td>der Honig, der Frühling</td></tr>
          <tr><td>Most nouns ending in a consonant (no fixed rule)</td><td>varies</td><td>der Tisch, die Zeit, das Buch</td></tr>
        </tbody>
      </table>
      <p>These are tendencies, not guarantees — there are exceptions, so the list/search mode is your best tool for double-checking.</p>
    </div>
    <div class="rule-section">
      <h3>3. Plural formation patterns</h3>
      <table class="rule-table">
        <thead><tr><th>Pattern</th><th>Example</th></tr></thead>
        <tbody>
          <tr><td>+ -e (often with umlaut)</td><td>der Tisch → die Tische, der Stuhl → die Stühle</td></tr>
          <tr><td>+ -er (often with umlaut)</td><td>das Buch → die Bücher, das Kind → die Kinder</td></tr>
          <tr><td>+ -n / -en</td><td>die Lampe → die Lampen, die Zeit → die Zeiten</td></tr>
          <tr><td>+ -s (often loanwords)</td><td>das Auto → die Autos, das Hotel → die Hotels</td></tr>
          <tr><td>no change (often -er, -el, -en endings)</td><td>der Lehrer → die Lehrer</td></tr>
        </tbody>
      </table>
      <p>All plural nouns take the article <strong>die</strong>, regardless of the singular gender. A small set of A1 nouns (mass nouns/abstract concepts like Butter, Glück, Wetter) don't really have a plural form at all.</p>
    </div>
    <div class="rule-section">
      <h3>4. Compound nouns take the gender of the last word</h3>
      <div class="example-box">
        das Schwimmbad (Schwimmen + das Bad) → neuter, because "das Bad" is the last part.
      </div>
    </div>
  `;

  function render(mode){
    switch(mode){
      case 'genderChoices': renderGenderChoices(); break;
      case 'typedGender': renderTypedGender(); break;
      case 'meaningChoices': renderMeaningChoices(); break;
      case 'typedMeaning': renderTypedMeaning(); break;
      case 'pluralChoices': renderPluralChoices(); break;
      case 'mistakes': renderMistakesGate(); break;
      case 'nounList': renderNounList(); break;
      case 'rules': document.getElementById('appMain').innerHTML = `<div class="card"><span class="tag">Rules</span>${RULES_HTML}</div>`; break;
    }
  }

  TOPICS.nouns = {
    sub: '320 A1 nouns · gender, plurals &amp; meanings',
    defaultMode: 'genderChoices',
    modes: [
      {key:'genderChoices', label:'Gender choices'},
      {key:'typedGender', label:'Typed gender'},
      {key:'meaningChoices', label:'Meaning choices'},
      {key:'typedMeaning', label:'Typed meaning'},
      {key:'pluralChoices', label:'Plural recognition'},
      {key:'mistakes', label:'Mistakes only'},
      {key:'nounList', label:'Noun list'},
      {key:'rules', label:'Rules'}
    ],
    render
  };
})();

/* ============================ NUMBERS MODULE ============================ */
(function(){
  const topicKey = 'numbers';

  function pickNum(){
    const x = pick(NUMBERS, e=>e.n===state.lastKey[topicKey]);
    state.lastKey[topicKey] = x.n;
    return x;
  }
  function numByN(n){ return NUMBERS.find(e=>e.n===n); }
  function primaryWord(entry){ return entry.words[0]; }
  function mistakeKey(entry){ return `${entry.type}:${entry.n}`; }

  function renderNumberToWord(mistakeEntry){
    const num = mistakeEntry ? numByN(mistakeEntry.n) : pickNum();
    const correct = primaryWord(num);
    const distractPool = shuffle(NUMBERS.filter(e=>e.n!==num.n).map(e=>primaryWord(e)));
    const distractors = distractPool.slice(0,3);
    const options = shuffle([correct, ...distractors]);
    const main = document.getElementById('appMain');
    main.innerHTML = `
      <div class="card">
        <span class="tag">${mistakeEntry?'Mistakes · ':''}Number &rarr; word</span>
        <div class="prompt-word">${num.n}</div>
        <div class="prompt-sub">How do you spell this number in German?</div>
        <div class="choices" id="choiceArea">
          ${options.map(m=>`<button class="choice-btn" data-val="${escapeHtml(m)}">${escapeHtml(m)}</button>`).join('')}
        </div>
        <div id="feedbackArea"></div>
      </div>
    `;
    document.querySelectorAll('#choiceArea .choice-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const isCorrect = btn.dataset.val===correct;
        document.querySelectorAll('#choiceArea .choice-btn').forEach(b=>{
          b.disabled = true;
          if(b.dataset.val===correct) b.classList.add('correct');
          else if(b===btn) b.classList.add('wrong');
          else b.classList.add('dim');
        });
        registerAnswer(topicKey, isCorrect);
        const entry = {type:'n2w', n:num.n};
        if(isCorrect) removeMistake(topicKey, entry, mistakeKey); else addMistake(topicKey, entry, mistakeKey);
        showFeedback({
          isCorrect,
          answerLineHtml:`${num.n} = <strong>${escapeHtml(correct)}</strong>`,
          onNext: ()=> state.mode==='mistakes' ? renderMistakesGate() : renderNumberToWord()
        });
      });
    });
  }

  function renderWordToNumber(mistakeEntry){
    const num = mistakeEntry ? numByN(mistakeEntry.n) : pickNum();
    const correct = num.n;
    const distractPool = shuffle(NUMBERS.filter(e=>e.n!==num.n).map(e=>e.n));
    const distractors = distractPool.slice(0,3);
    const options = shuffle([correct, ...distractors]);
    const main = document.getElementById('appMain');
    main.innerHTML = `
      <div class="card">
        <span class="tag">${mistakeEntry?'Mistakes · ':''}Word &rarr; number</span>
        <div class="prompt-word">${escapeHtml(primaryWord(num))}</div>
        <div class="prompt-sub">Which number is this?</div>
        <div class="choices grid3" id="choiceArea">
          ${options.map(m=>`<button class="choice-btn" data-val="${m}">${m}</button>`).join('')}
        </div>
        <div id="feedbackArea"></div>
      </div>
    `;
    document.querySelectorAll('#choiceArea .choice-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const isCorrect = Number(btn.dataset.val)===correct;
        document.querySelectorAll('#choiceArea .choice-btn').forEach(b=>{
          b.disabled = true;
          if(Number(b.dataset.val)===correct) b.classList.add('correct');
          else if(b===btn) b.classList.add('wrong');
          else b.classList.add('dim');
        });
        registerAnswer(topicKey, isCorrect);
        const entry = {type:'w2n', n:num.n};
        if(isCorrect) removeMistake(topicKey, entry, mistakeKey); else addMistake(topicKey, entry, mistakeKey);
        showFeedback({
          isCorrect,
          answerLineHtml:`${escapeHtml(primaryWord(num))} = <strong>${correct}</strong>`,
          onNext: ()=> state.mode==='mistakes' ? renderMistakesGate() : renderWordToNumber()
        });
      });
    });
  }

  function renderTypedNumber(mistakeEntry){
    const num = mistakeEntry ? numByN(mistakeEntry.n) : pickNum();
    const main = document.getElementById('appMain');
    main.innerHTML = `
      <div class="card">
        <span class="tag">${mistakeEntry?'Mistakes · ':''}Typed number word</span>
        <div class="prompt-word">${num.n}</div>
        <div class="prompt-sub">Type the German word for this number.</div>
        <div class="type-row">
          <input type="text" id="typedInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="e.g. zweiundzwanzig">
          <button class="btn" id="submitBtn">Check</button>
        </div>
        <div id="feedbackArea"></div>
      </div>
    `;
    const input = document.getElementById('typedInput');
    input.focus();
    const submit = ()=>{
      const raw = input.value;
      if(!raw.trim()) return;
      const userNorm = normalizeTyped(raw);
      const userAscii = normalizeDeAscii(raw);
      const isCorrect = num.words.some(w=> normalizeTyped(w)===userNorm || normalizeDeAscii(w)===userAscii);
      input.disabled = true;
      document.getElementById('submitBtn').disabled = true;
      registerAnswer(topicKey, isCorrect);
      const entry = {type:'typed', n:num.n};
      if(isCorrect) removeMistake(topicKey, entry, mistakeKey); else addMistake(topicKey, entry, mistakeKey);
      showFeedback({
        isCorrect,
        answerLineHtml:`${num.n} = <strong>${escapeHtml(primaryWord(num))}</strong>${num.words.length>1?` <span style="color:var(--ink-soft);font-weight:400;">(also: ${escapeHtml(num.words.slice(1).join(', '))})</span>`:''}`,
        onNext: ()=> state.mode==='mistakes' ? renderMistakesGate() : renderTypedNumber()
      });
    };
    document.getElementById('submitBtn').addEventListener('click', submit);
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
  }

  function renderMistakesGate(){
    const list = state.mistakes[topicKey];
    if(list.length===0){
      const main = document.getElementById('appMain');
      main.innerHTML = `
        <div class="card">
          <span class="tag">Mistakes only</span>
          <div class="empty-state">
            <div class="big">&#10003;</div>
            <h3>No mistakes saved yet</h3>
            <p>Answer some questions in the other modes — anything you get wrong will show up here so you can drill it.</p>
          </div>
        </div>
      `;
      return;
    }
    const entry = list[Math.floor(Math.random()*list.length)];
    if(entry.type==='n2w') renderNumberToWord(entry);
    else if(entry.type==='w2n') renderWordToNumber(entry);
    else renderTypedNumber(entry);
    const tag = document.querySelector('#appMain .tag');
    if(tag) tag.textContent = `Mistakes only (${list.length} saved)`;
  }

  function renderNumberList(){
    const main = document.getElementById('appMain');
    main.innerHTML = `
      <div class="card">
        <span class="tag">Number list</span>
        <h2 style="margin-top:0;">0–100 reference table</h2>
        <div class="search-row">
          <input type="text" id="searchInput" placeholder="Search by digit or spelling…">
        </div>
        <div class="table-scroll">
          <table class="datatable">
            <thead><tr><th>Number</th><th>German</th><th>Other spellings</th></tr></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    `;
    const body = document.getElementById('tableBody');
    function draw(filter){
      const f = filter.trim().toLowerCase();
      const rows = NUMBERS.filter(e=> !f || String(e.n).includes(f) || e.words.some(w=>w.toLowerCase().includes(f)));
      body.innerHTML = rows.map(e=>`
        <tr>
          <td><strong>${e.n}</strong></td>
          <td>${escapeHtml(e.words[0])}</td>
          <td style="color:var(--ink-soft);">${escapeHtml(e.words.slice(1).join(', ')||'—')}</td>
        </tr>
      `).join('') || `<tr><td colspan="3" style="color:var(--ink-soft);">No numbers match your search.</td></tr>`;
    }
    draw('');
    document.getElementById('searchInput').addEventListener('input', e=>draw(e.target.value));
  }

  const RULES_HTML = `
    <h2 style="margin-top:0;">How German numbers work</h2>
    <div class="rule-section">
      <h3>1. 0–12: just memorize them</h3>
      <div class="example-box">
        null, eins, zwei, drei, vier, fünf, sechs, sieben, acht, neun, zehn, elf, zwölf
      </div>
    </div>
    <div class="rule-section">
      <h3>2. 13–19: digit + "zehn"</h3>
      <div class="example-box">
        drei<strong>zehn</strong> (13), vier<strong>zehn</strong> (14) … neun<strong>zehn</strong> (19)
      </div>
      <p>Watch the two irregulars: <strong>sech<u>z</u>ehn</strong> (16, drops the -s from sechs) and <strong>sieb<u>z</u>ehn</strong> (17, drops the -en from sieben).</p>
    </div>
    <div class="rule-section">
      <h3>3. The tens: 20, 30, 40…</h3>
      <table class="rule-table">
        <thead><tr><th>20</th><th>30</th><th>40</th><th>50</th><th>60</th><th>70</th><th>80</th><th>90</th></tr></thead>
        <tbody>
          <tr><td>zwanzig</td><td>dreißig</td><td>vierzig</td><td>fünfzig</td><td>sechzig</td><td>siebzig</td><td>achtzig</td><td>neunzig</td></tr>
        </tbody>
      </table>
      <p>Most tens are digit + "-zig". Exceptions: <strong>zwanzig</strong> (20, not "zweizig"), <strong>dreißig</strong> (30, uses -ßig not -zig), and sechzig/siebzig drop letters the same way as sechzehn/siebzehn.</p>
    </div>
    <div class="rule-section">
      <h3>4. Compound numbers: units come BEFORE tens, joined by "und"</h3>
      <p>This is the single most important rule and the opposite order from English.</p>
      <div class="example-box">
        21 = ein<strong>und</strong>zwanzig &nbsp;<em>(literally "one-and-twenty")</em><br>
        32 = zwei<strong>und</strong>dreißig<br>
        47 = sieben<strong>und</strong>vierzig<br>
        99 = neun<strong>und</strong>neunzig
      </div>
      <p>The whole compound number is written as <strong>one word</strong>, with no spaces or hyphens.</p>
    </div>
    <div class="rule-section">
      <h3>5. eins vs. ein</h3>
      <p>The number 1 on its own (counting, telephone numbers, math) is <strong>eins</strong>. But when "one" is compounded into a bigger number, it shortens to <strong>ein</strong>: 21 = einundzwanzig (not "einsundzwanzig"), 31 = einunddreißig.</p>
    </div>
    <div class="rule-section">
      <h3>6. 100</h3>
      <p><strong>(ein)hundert</strong> — both "hundert" and "einhundert" are accepted ways to say 100.</p>
    </div>
    <div class="rule-section">
      <h3>7. Spelling note: ß vs. ss</h3>
      <p>dreißig is officially spelled with ß. In some contexts (e.g. all-caps text, or older Swiss usage) you may see "dreissig" with ss instead — both are recognized as the same word in this app.</p>
    </div>
  `;

  function render(mode){
    switch(mode){
      case 'numberToWord': renderNumberToWord(); break;
      case 'wordToNumber': renderWordToNumber(); break;
      case 'typedNumber': renderTypedNumber(); break;
      case 'mistakes': renderMistakesGate(); break;
      case 'numberList': renderNumberList(); break;
      case 'rules': document.getElementById('appMain').innerHTML = `<div class="card"><span class="tag">Rules</span>${RULES_HTML}</div>`; break;
    }
  }

  TOPICS.numbers = {
    sub: '0–100 · spelling, compound formation &amp; recognition',
    defaultMode: 'numberToWord',
    modes: [
      {key:'numberToWord', label:'Number → word'},
      {key:'wordToNumber', label:'Word → number'},
      {key:'typedNumber', label:'Typed number word'},
      {key:'mistakes', label:'Mistakes only'},
      {key:'numberList', label:'Number list'},
      {key:'rules', label:'Rules'}
    ],
    render
  };
})();

/* ============================ INIT ============================ */
document.querySelectorAll('#topicButtons button').forEach(btn=>{
  btn.addEventListener('click', ()=>setTopic(btn.dataset.topic));
});
document.getElementById('resetStatsBtn').addEventListener('click', ()=>{
  if(confirm('Reset score, streak and accuracy for this topic? (Saved mistakes are kept.)')){
    state.stats[state.topic] = {total:0, correct:0, streak:0, best:0};
    saveStats(state.topic);
    renderStats();
  }
});
setTopic('modal');
